<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дневник Тренировок</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d12;
  --surface:#14141c;
  --surface2:#1c1c28;
  --border:#252535;
  --border2:#2e2e42;
  --txt:#e8e8f4;
  --txt2:#9090b0;
  --txt3:#55556a;
  --accent:#ff4f00;
  --accent2:#ff8c00;
  --blue:#3b8cff;
  --green:#00e57a;
  --red:#ff3b5c;
  --yellow:#ffd000;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);
  color:var(--txt);
  height:100vh;
  display:flex;
  flex-direction:column;
  background-image:
    radial-gradient(ellipse 60% 40% at 80% -10%, rgba(255,79,0,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 10% 100%, rgba(59,140,255,0.08) 0%, transparent 50%);
}
.app{padding:1rem 1rem 0.5rem;flex:1;display:flex;flex-direction:column;max-width:100%;}

/* ШАПКА */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 2px;margin-bottom:1rem;position:relative}
.hdr-nav{display:flex;align-items:center;gap:4px}
.nav-btn{
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:8px;
  color:var(--accent);
  font-size:20px;font-weight:800;
  cursor:pointer;padding:4px 12px;line-height:1;
  transition:all 0.15s;
}
.nav-btn:hover{background:var(--border2);color:#fff}
.month-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:26px;font-weight:800;
  color:var(--txt);
  min-width:220px;
  letter-spacing:0.02em;
  text-transform:uppercase;
}
.editor-btn{
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:8px;padding:7px 36px;
  cursor:pointer;font-size:13px;font-weight:600;
  color:var(--txt2);
  transition:all 0.15s;
  letter-spacing:0.02em;
  white-space:nowrap;flex-shrink:0;
}
.editor-btn:hover{background:var(--border2);color:var(--txt)}

/* РЕДАКТОР ДРОПДАУН */
.editor-drop{
  display:none;position:fixed;
  width:300px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:14px;z-index:600;padding:14px;
  box-shadow:0 8px 40px rgba(0,0,0,0.7);
}
.editor-drop.open{display:block}
.editor-drop-title{font-size:13px;font-weight:700;color:var(--txt2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em}
.ex-listbox{border:1px solid var(--border);border-radius:10px;max-height:240px;overflow-y:auto;margin-bottom:8px;background:var(--bg)}
.ex-listbox-item{padding:9px 12px;font-size:13px;color:var(--txt);cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s}
.ex-listbox-item:last-child{border-bottom:none}
.ex-listbox-item:hover{background:var(--surface2)}
.ex-listbox-item.sel{background:var(--accent);color:#fff}
.editor-btns{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-bottom:8px}
.ed-btn{border:1px solid var(--border2);background:var(--surface2);border-radius:8px;padding:7px 4px;font-size:12px;cursor:pointer;color:var(--txt);font-weight:600;text-align:center;transition:all 0.15s}
.ed-btn:hover{background:var(--border2)}
.ed-btn.blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.ed-btn.red{background:var(--red);color:#fff;border-color:var(--red)}
.ed-btn:disabled{opacity:0.3;cursor:default;pointer-events:none}
.editor-input-row{display:flex;gap:6px}
.editor-input{flex:1;border:1px solid var(--border2);border-radius:8px;padding:8px 10px;font-size:13px;background:var(--bg);color:var(--txt);outline:none}
.editor-input:focus{border-color:var(--accent)}
.editor-input-ok{background:var(--accent);border:none;border-radius:8px;padding:8px 14px;font-size:13px;color:#fff;cursor:pointer;font-weight:700}

/* ДНИ НЕДЕЛИ */
.wdays{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border-bottom:1px solid var(--border)}
.wd{
  text-align:center;
  font-family:'Barlow',sans-serif;
  font-size:11px;font-weight:700;
  color:var(--txt3);
  padding:6px 0;
  text-transform:uppercase;
  letter-spacing:0.07em;
}
.wd.weekend{color:#5a3a4a}

/* СЕТКА */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(4,1fr);gap:0;flex:1;min-height:0}

/* ЯЧЕЙКА ДЕНЬ */
.day{
  min-height:0;
  background:var(--bg);
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:3px 5px 2px;
  cursor:pointer;
  overflow:hidden;
  position:relative;
}
.day:nth-child(7n){border-right:none}
.day:hover{background:#141420}
.day.empty{background:var(--bg);cursor:default;pointer-events:none;opacity:0.4}
.day.weekend{background:#0c0c14}
.day.weekend:hover{background:#111118}

/* сегодня */
.day.today .dnum{
  background:#5c6bc0;
  color:#fff;
  border-radius:50%;
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;
}

/* номер дня */
.dnum{
  font-family:'Barlow',sans-serif;
  font-size:12px;font-weight:500;
  color:var(--txt2);
  margin-bottom:2px;
  display:inline-block;
  line-height:1;
  min-width:20px;
  text-align:center;
}
.day.weekend .dnum{color:#5a3a4a}

/* чипы упражнений — стиль Google Calendar */
.day-chip{
  display:block;
  width:100%;
  margin-bottom:2px;
  padding:2px 6px;
  border-radius:4px;
  font-family:'Barlow',sans-serif;
  font-size:13px;
  font-weight:500;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  line-height:1.45;
  background:#a8c8ef;
  color:#000;
  cursor:pointer;
  box-sizing:border-box;
}
.day-chip:hover{background:#8eb8e8}
.day-chip.done{background:#7dd4a8;color:#000}
.day-chip.done:hover{background:#63c495}
.day-chip.fail{background:#f0a0aa;color:#000}
.day-chip.fail:hover{background:#e88090}
.day-chip.main{
  background:var(--accent);
  color:#000;
  font-weight:700;
}
.day-chip.main:hover{background:var(--accent2)}
.day-chip.main.done{background:#00c96a;color:#000}
.day-chip.main.done:hover{background:#00b05c}
.day-chip.main.fail{background:#e02040;color:#000}
.day-chip.main.fail:hover{background:#c81830}
.day-chip.more{background:none;color:var(--txt3);font-size:12px;padding:2px 4px;font-weight:600;cursor:pointer}
.day-chip.more:hover{color:var(--txt);background:none}

/* ОВЕРЛЕЙ */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 16px;backdrop-filter:blur(4px)}
.mbg.open{display:flex}
.modal{
  background:var(--surface);
  border-radius:18px;
  border:1px solid var(--border2);
  width:min(820px,96vw);
  margin:auto;
  overflow:hidden;
  box-shadow:0 16px 60px rgba(0,0,0,0.7);
}
.modal-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 24px 14px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(90deg,var(--surface2) 0%,var(--surface) 100%);
  position:relative;
}
.modal-hdr::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2),transparent);
}
.modal-hdr h2{
  font-family:'Barlow Condensed',sans-serif;
  font-size:20px;font-weight:800;
  color:var(--txt);
  text-transform:uppercase;
  letter-spacing:0.04em;
}
.modal-close{
  width:32px;height:32px;border-radius:8px;
  border:1px solid var(--border2);
  background:var(--surface2);
  cursor:pointer;font-size:15px;color:var(--txt2);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.modal-close:hover{background:var(--red);color:#fff;border-color:var(--red)}
.modal-body{padding:18px 24px}

/* ПАНЕЛЬ ВВОДА */
.input-bar{
  background:var(--bg);
  border-radius:12px;padding:12px 14px;
  margin-bottom:16px;
  display:flex;flex-direction:column;gap:8px;
  border:1px solid var(--border2);
}
.input-select{
  flex:1;min-width:0;
  border:1px solid var(--border2);border-radius:8px;
  padding:8px 10px;font-size:13px;font-weight:600;
  background:var(--surface2);color:var(--txt);outline:none;cursor:pointer;
  font-family:'Barlow',sans-serif;
}
.input-select:focus{border-color:var(--accent)}
.input-row{display:flex;align-items:center;gap:8px;flex-wrap:nowrap}
.input-label{font-size:11px;font-weight:700;color:var(--txt3);white-space:nowrap;width:80px;flex-shrink:0;text-transform:uppercase;letter-spacing:0.04em}
.input-num{width:80px;flex-shrink:0;border:1px solid var(--border2);border-radius:8px;padding:8px 10px;font-size:13px;font-weight:600;background:var(--surface2);color:var(--txt);outline:none;text-align:center;font-family:'Barlow',sans-serif}
.input-num:focus{border-color:var(--accent)}
.add-btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:8px;padding:10px 24px;
  cursor:pointer;font-size:13px;font-weight:800;
  color:#fff;white-space:nowrap;
  text-transform:uppercase;letter-spacing:0.06em;
  transition:all 0.15s;
  font-family:'Barlow',sans-serif;
}
.add-btn:hover{opacity:0.85;transform:translateY(-1px)}

/* ТАБЛИЦА ТРЕНИРОВКИ */
.workout-table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
.workout-table{width:100%;border-collapse:collapse;font-family:'Barlow',sans-serif;min-width:400px}

/* шапка таблицы */
.workout-table thead tr{background:var(--bg)}
.workout-table thead th{
  padding:9px 14px;
  font-size:10px;font-weight:800;
  color:var(--txt3);
  text-transform:uppercase;letter-spacing:0.07em;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.workout-table thead th.th-name{text-align:left}
.workout-table thead th.th-num{text-align:center;width:54px}

/* строки */
.workout-table tbody tr{transition:background 0.12s}
.workout-table tbody tr:hover td{background:var(--surface2)}
.workout-table tbody tr:not(:last-child) td{border-bottom:1px solid var(--border)}

/* ячейки */
.workout-table tbody td{
  padding:10px 14px;
  background:var(--surface);
  vertical-align:middle;
}

/* название упражнения */
.td-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:800;
  color:var(--txt);
  text-transform:uppercase;
  letter-spacing:0.03em;
  white-space:nowrap;
}
.td-name.is-main{color:var(--accent2)}

/* вес */
.td-weight{
  font-size:13px;font-weight:700;
  color:var(--txt);
  white-space:nowrap;
  text-align:center;
}

/* %1ПМ */
.td-pct{
  font-size:12px;font-weight:700;
  text-align:center;
  white-space:nowrap;
  border-radius:6px;
}

/* ячейка подхода */
.td-set{text-align:center;width:54px}
.set-cell{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:38px;height:36px;
  border-radius:8px;
  border:1.5px solid var(--border2);
  background:var(--surface2);
  font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:700;
  color:var(--txt2);
  cursor:pointer;
  transition:all 0.12s;
  position:relative;
}
.set-cell:hover{border-color:var(--accent);color:var(--txt);background:#1e1a28}
.set-cell.empty{border-style:dashed;color:var(--txt3);font-size:18px;font-weight:400}
.set-cell.empty:hover{border-color:var(--accent);color:var(--accent)}

/* КОНТЕКСТНОЕ МЕНЮ */
.ctx-menu{
  position:fixed;z-index:1000;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:4px;
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  min-width:160px;
  display:none;
}
.ctx-menu.open{display:block}
.ctx-item{
  padding:9px 14px;
  font-size:13px;font-weight:600;
  color:var(--txt);
  border-radius:7px;
  cursor:pointer;
  display:flex;align-items:center;gap:8px;
  transition:background 0.1s;
  white-space:nowrap;
}
.ctx-item:hover{background:var(--surface2)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger:hover{background:rgba(255,59,92,0.12)}
.ctx-sep{height:1px;background:var(--border);margin:3px 0}

/* inline редактирование ячейки названия / веса */
.td-inline-input{
  border:none;background:transparent;
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:800;
  color:var(--accent);
  outline:none;
  width:100%;min-width:60px;
  border-bottom:1.5px solid var(--accent);
  padding:0;
}
.td-weight-input{
  border:none;background:transparent;
  font-family:'Barlow',sans-serif;
  font-size:13px;font-weight:700;
  color:var(--accent);
  outline:none;
  width:64px;text-align:center;
  border-bottom:1.5px solid var(--accent);
  padding:0;
}
.td-weight-input::-webkit-inner-spin-button,.td-weight-input::-webkit-outer-spin-button{-webkit-appearance:none}
.set-cell-wrap{
  display:flex;align-items:center;justify-content:center;gap:3px;
  min-width:64px;height:36px;
  border-radius:8px;
  border:1.5px solid var(--border2);
  background:var(--surface2);
  padding:0 6px;
  transition:border-color 0.12s;
}
.set-cell-wrap:focus-within{border-color:var(--accent)}
.set-plan{
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:800;color:var(--txt2);
  white-space:nowrap;flex-shrink:0;
}
.set-sep{font-size:11px;color:var(--txt3);flex-shrink:0}
.set-fact{
  width:32px;border:none;background:transparent;
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:800;
  color:var(--txt2);outline:none;text-align:center;padding:0;
}
.set-fact::-webkit-inner-spin-button,.set-fact::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.set-fact::placeholder{color:var(--txt3);font-weight:400}
.set-fact.fact-done{color:var(--green)}
.set-fact.fact-fail{color:var(--red)}

.ex-cards-empty{text-align:center;color:var(--txt3);padding:32px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em}

.del-btn{
  width:100%;margin-top:14px;
  border:1px solid var(--border);border-radius:10px;
  padding:11px;cursor:pointer;font-size:12px;font-weight:700;
  color:var(--txt3);background:var(--bg);
  transition:all 0.15s;text-transform:uppercase;letter-spacing:0.05em;
}
.del-btn.active{border-color:var(--red);color:var(--red);background:rgba(255,59,92,0.1)}
.del-btn.active:hover{background:rgba(255,59,92,0.2)}
.del-btn:disabled{opacity:0.3;cursor:default;pointer-events:none}

/* del button under cards */
.del-btn{width:100%;margin-top:14px;border:1px solid var(--border);border-radius:10px;padding:11px;cursor:pointer;font-size:12px;font-weight:700;color:var(--txt3);background:var(--bg);transition:all 0.15s;text-transform:uppercase;letter-spacing:0.05em}
.del-btn.active{border-color:var(--red);color:var(--red);background:rgba(255,59,92,0.1)}
.del-btn.active:hover{background:rgba(255,59,92,0.2)}
.del-btn:disabled{opacity:0.3;cursor:default;pointer-events:none}

.plan-fact-row{display:flex;align-items:center;gap:6px}
.pf-label{font-size:11px;font-weight:700;color:var(--txt3);white-space:nowrap;width:36px;text-align:right;text-transform:uppercase;letter-spacing:0.04em}
.pf-input{width:64px;border:1px solid var(--border2);border-radius:8px;padding:7px 6px;font-size:13px;font-weight:700;background:var(--surface2);color:var(--txt);outline:none;text-align:center;font-family:'Barlow',sans-serif}
.pf-input:focus{border-color:var(--accent)}
.no-arrows::-webkit-inner-spin-button,.no-arrows::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.no-arrows{-moz-appearance:textfield}
.input-num::-webkit-inner-spin-button,.input-num::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.input-num{-moz-appearance:textfield}

/* ЧИПЫ РЕКОРДОВ */
.hdr-stats{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stat-chip{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:8px;padding:6px 12px;
  cursor:pointer;transition:all 0.15s;
}
.stat-chip:hover{background:var(--surface2);border-color:var(--accent)}
.stat-chip-label{font-size:10px;font-weight:700;color:var(--txt3);white-space:nowrap;text-transform:uppercase;letter-spacing:0.05em}
.stat-chip-val{font-size:13px;font-weight:700;color:var(--txt);white-space:nowrap}
.stat-chip-val.highlight{color:var(--accent2)}

.chip-input{width:60px;border:none;border-bottom:1px solid var(--accent);background:transparent;color:var(--txt);font-size:13px;font-weight:700;outline:none;text-align:center;padding:0 2px;font-family:'Barlow',sans-serif}

/* ДИАЛОГ ПОДТВЕРЖДЕНИЯ */
.confirm-dlg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.confirm-dlg.open{display:flex}
.confirm-box{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:16px;padding:24px;width:260px;text-align:center;
  box-shadow:0 16px 40px rgba(0,0,0,0.6);
}
.confirm-box p{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:18px;line-height:1.5}
.confirm-actions{display:flex;gap:8px;justify-content:center}
.confirm-yes{background:var(--red);border:none;border-radius:8px;padding:9px 22px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;text-transform:uppercase;letter-spacing:0.04em}
.confirm-no{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 22px;color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif}

.row-del-btn{background:none;border:none;color:var(--border2);font-size:15px;cursor:pointer;padding:0 4px;line-height:1;transition:color 0.15s}
.row-del-btn:hover{color:var(--red)}
.pf-sep{font-size:14px;color:var(--txt3)}

/* SYNC BUTTONS */
.sync-btn{
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:6px 13px;
  cursor:pointer;
  font-size:12px;font-weight:700;
  color:var(--txt2);
  transition:all 0.15s;
  letter-spacing:0.03em;
  white-space:nowrap;flex-shrink:0;
  font-family:'Barlow',sans-serif;
}
.sync-btn:hover{background:var(--border2);color:var(--txt)}
.sync-btn.save{color:var(--green);border-color:var(--green)}
.sync-btn.save:hover{background:rgba(0,229,122,0.12)}
.sync-btn.load{color:var(--blue);border-color:var(--blue)}
.sync-btn.load:hover{background:rgba(59,140,255,0.12)}
.sync-btn:disabled{opacity:0.4;cursor:default;pointer-events:none}
.sync-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:10px 20px;
  font-size:13px;font-weight:600;color:var(--txt);
  box-shadow:0 4px 24px rgba(0,0,0,0.5);
  z-index:9999;opacity:0;transition:opacity 0.25s;
  pointer-events:none;white-space:nowrap;
}
.sync-toast.show{opacity:1}
</style>
</head>
<body>

<div class="app">
  <div class="hdr">
    <div class="hdr-nav">
      <button class="nav-btn" id="prevBtn">&#8249;</button>
      <span class="month-title" id="monthTitle"></span>
      <button class="nav-btn" id="nextBtn">&#8250;</button>
      <button class="sync-btn save" id="syncSaveBtn" title="Сохранить в Telegram">&#11014; TG</button>

          <input class="pf-input no-arrows" id="inORM" type="number" min="0" max="9999" step="0.5" placeholder="кг" style="color:var(--accent2)">

          <span class="input-label">Повторения</span>

  <div class="ctx-item" id="ctxDelSet" style="display:none">🗑 Удалить подход</div>
  <div class="ctx-sep" id="ctxSep" style="display:none"></div>
  <div class="ctx-item danger" id="ctxDelEx">✕ Удалить упражнение</div>

<script>
const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const PINNED=['Приседания','Жим лёжа','Становая тяга'];
const REST=['Подтягивания','Жим стоя','Тяга штанги','Отжимания','Жим гантелей','Планка','Скручивания'];
let exercises=[...PINNED,...REST];
let sets=[];let nextId=1;
let bodyweight=null;
let records={};// {упражнение: 1пм_кг}
try{const s=localStorage.getItem('gd_sets2');if(s){const d=JSON.parse(s);sets=d.sets||[];nextId=d.nextId||1;}}catch(e){}
try{const s=localStorage.getItem('gd_ex2');if(s)exercises=JSON.parse(s);}catch(e){}
try{const s=localStorage.getItem('gd_bw');if(s)bodyweight=parseFloat(s);}catch(e){}
try{const s=localStorage.getItem('gd_rec');if(s)records=JSON.parse(s);}catch(e){}
function persist(){try{localStorage.setItem('gd_sets2',JSON.stringify({sets,nextId}));localStorage.setItem('gd_ex2',JSON.stringify(exercises));if(bodyweight!=null)localStorage.setItem('gd_bw',bodyweight);localStorage.setItem('gd_rec',JSON.stringify(records));}catch(e){}}

function limitNum(el){if(!el)return;el.addEventListener('input',()=>{let v=el.value.replace(/[^0-9.]/g,'');const p=v.split('.');if(p[0].length>4)p[0]=p[0].slice(0,4);v=p.length>1?p[0]+'.'+p[1].slice(0,1):p[0];if(el.value!==v)el.value=v;});}
limitNum(document.getElementById('inPlan'));
limitNum(document.getElementById('inWt'));
limitNum(document.getElementById('inORM'));

const REC_EX=['Становая тяга','Жим лёжа','Приседания'];
function renderHdrStats(){
  document.getElementById('valBodyweight').textContent=bodyweight!=null?`${bodyweight} кг`:'— кг';
  REC_EX.forEach(ex=>{
    const el=document.getElementById('rec'+ex);
    if(el)el.textContent=records[ex]!=null?`${records[ex]} кг`:'— кг';
  });
}
renderHdrStats();

// редактирование веса атлета по клику на чип
document.getElementById('chipBodyweight').addEventListener('click',()=>{
  const chip=document.getElementById('chipBodyweight');
  const valEl=document.getElementById('valBodyweight');
  const inp=document.createElement('input');
  inp.className='chip-input';inp.type='number';inp.min=0;inp.max=999;inp.step=0.1;
  inp.value=bodyweight||'';inp.placeholder='кг';
  valEl.replaceWith(inp);inp.focus();inp.select();
  function save(){
    const v=parseFloat(inp.value);
    bodyweight=isNaN(v)?null:v;
    persist();
    const newEl=document.createElement('span');
    newEl.id='valBodyweight';newEl.className='stat-chip-val';
    newEl.textContent=bodyweight!=null?`${bodyweight} кг`:'— кг';
    inp.replaceWith(newEl);
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value='';inp.blur();}});
});

const now=new Date();
const todayStr=now.toISOString().slice(0,10);

// Anchor = понедельник текущей недели (начало блока из 5 недель)
function getMondayOf(date){
  const d=new Date(date);
  const dow=d.getDay(); // 0=вс
  const diff=(dow===0)?-6:1-dow;
  d.setDate(d.getDate()+diff);
  return d;
}
// anchorMonday — первый Пн отображаемого блока
let anchorMonday=getMondayOf(now);
// Смещаем так, чтобы сегодня попадал примерно во 2-ю неделю из 4
anchorMonday.setDate(anchorMonday.getDate()-7);

function dkey(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function dateToKey(d){return dkey(d.getFullYear(),d.getMonth(),d.getDate());}
function sortedExercises(){const p=exercises.filter(e=>PINNED.includes(e)).sort((a,b)=>PINNED.indexOf(a)-PINNED.indexOf(b));const r=exercises.filter(e=>!PINNED.includes(e)).sort();return[...p,...r];}

const MONTHS_SHORT=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

function getWorkoutsForRange(startDate, endDate){
  const byDate={};
  // собираем все подходы в диапазоне
  const s0=dateToKey(startDate), s1=dateToKey(endDate);
  const rangeSets=sets.filter(s=>s.date>=s0&&s.date<=s1);

  const exByDate={};
  rangeSets.forEach(s=>{
    const key=s.date+'|'+s.exercise;
    if(!exByDate[key])exByDate[key]=[];
    exByDate[key].push(s);
  });

  const ordered=rangeSets.filter(s=>s.set_number===1).map(s=>s.date+'|'+s.exercise);
  const seen=new Set();
  ordered.forEach(k=>{
    if(seen.has(k)||!exByDate[k])return;
    seen.add(k);
    const exSets=exByDate[k];
    const date=exSets[0].date;
    const ex=exSets[0].exercise;
    const maxWt=Math.max(...exSets.map(s=>parseFloat(s.weight)||0));
    const working=exSets.filter(s=>(parseFloat(s.weight)||0)===maxWt);
    if(!byDate[date])byDate[date]=[];
    const wtPart=maxWt>0?` ${maxWt}кг`:'';
    const sortedSets=[...exSets].sort((a,b)=>a.set_number-b.set_number);
    const firstSet=sortedSets[0];
    const allDone=firstSet&&firstSet.fact!=null&&firstSet.plan!=null&&firstSet.fact>=firstSet.plan;
    const anyFail=firstSet&&firstSet.fact!=null&&firstSet.plan!=null&&firstSet.fact<firstSet.plan;
    const setsNums=sortedSets.map(s=>{
      if(s.fact!=null) return String(s.fact);
      if(s.plan!=null) return String(s.plan);
      return '—';
    }).join('  ');
    byDate[date].push({label:`${ex}${wtPart}`,sets:setsNums,isDone:allDone,isFail:anyFail,raw:false});
  });
  return byDate;
}

const WEEKS=4; // количество недель в блоке
const DAYS_RU=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

function renderCalendar(){
  // диапазон: anchorMonday + 5 недель
  const startDate=new Date(anchorMonday);
  const endDate=new Date(anchorMonday);
  endDate.setDate(endDate.getDate()+WEEKS*7-1);

  // заголовок: диапазон месяцев
  const sm=startDate.getMonth(), em=endDate.getMonth();
  const sy=startDate.getFullYear(), ey=endDate.getFullYear();
  let title;
  if(sy===ey&&sm===em) title=`${MONTHS[sm]} ${sy}`;
  else if(sy===ey) title=`${MONTHS[sm]} — ${MONTHS[em]} ${sy}`;
  else title=`${MONTHS[sm]} ${sy} — ${MONTHS[em]} ${ey}`;
  document.getElementById('monthTitle').textContent=title;

  const g=document.getElementById('calGrid');g.innerHTML='';
  const workouts=getWorkoutsForRange(startDate,endDate);

  // рендерим строго WEEKS*7 ячеек
  for(let i=0;i<WEEKS*7;i++){
    const cur=new Date(startDate);
    cur.setDate(startDate.getDate()+i);
    const k=dateToKey(cur);
    const d=cur.getDate();
    const m=cur.getMonth();
    const dow=cur.getDay();
    const isWeekend=dow===0||dow===6;
    const isFirstOfMonth=d===1;

    const el=document.createElement('div');
    const cls=['day'];
    if(k===todayStr) cls.push('today');
    if(isWeekend) cls.push('weekend');
    el.className=cls.join(' ');

    // номер дня — если 1-е число, добавляем название месяца
    const dnum=document.createElement('span');
    dnum.className='dnum';
    if(isFirstOfMonth){
      dnum.innerHTML=`<span style="font-size:10px;color:var(--accent2);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;display:block;line-height:1.2">${MONTHS_SHORT[m]}</span>${d}`;
    } else {
      dnum.textContent=d;
    }
    el.appendChild(dnum);

    // чипы
    const exList=workouts[k]||[];
    const MAX=4;
    const total=exList.length;
    exList.slice(0,MAX).forEach((item,idx)=>{
      const chip=document.createElement('span');
      let chipClass='day-chip';
      if(idx===0) chipClass+=' main';
      if(item.isDone) chipClass+=' done';
      else if(item.isFail) chipClass+=' fail';
      chip.className=chipClass;
      chip.innerHTML=`<span style="font-weight:700">${item.label}</span><span style="margin-left:5px;font-weight:700">${item.sets}</span>`;
      chip.addEventListener('click',e=>{e.stopPropagation();openDay(k);});
      el.appendChild(chip);
    });

    if(total>MAX){
      const more=document.createElement('span');
      more.className='day-chip more';
      more.textContent=`${total-MAX} more`;
      more.addEventListener('click',e=>{
        e.stopPropagation();
        showOverflowPop(k,d,dow,exList,more);
      });
      el.appendChild(more);
    }

    el.addEventListener('click',()=>openDay(k));
    g.appendChild(el);
  }
}

// попап "+N more"
function showOverflowPop(dateKey,d,dow,exList,anchor){
  const pop=document.getElementById('overflowPop');
  document.getElementById('ovDow').textContent=DAYS_RU[dow];
  document.getElementById('ovDay').textContent=d;
  const list=document.getElementById('ovList');
  list.innerHTML='';
  exList.forEach((item,idx)=>{
    const chip=document.createElement('div');
    let chipClass='day-chip';
    if(idx===0) chipClass+=' main';
    if(item.isDone) chipClass+=' done';
    else if(item.isFail) chipClass+=' fail';
    chip.className=chipClass;
    chip.style.marginBottom='4px';
    chip.innerHTML=`<span style="font-weight:700">${item.label}</span><span style="margin-left:5px;font-weight:700">${item.sets}</span>`;
    chip.addEventListener('click',()=>{closeOverflowPop();openDay(dateKey);});
    list.appendChild(chip);
  });

  // позиция рядом с anchor
  const rect=anchor.getBoundingClientRect();
  pop.style.display='block';
  const pw=pop.offsetWidth||220;
  const ph=pop.offsetHeight||200;
  let left=rect.left;
  let top=rect.bottom+4;
  if(left+pw>window.innerWidth-12) left=window.innerWidth-pw-12;
  if(top+ph>window.innerHeight-12) top=rect.top-ph-4;
  pop.style.left=left+'px';
  pop.style.top=top+'px';
}

function closeOverflowPop(){
  document.getElementById('overflowPop').style.display='none';
}

document.getElementById('ovClose').addEventListener('click',closeOverflowPop);
document.addEventListener('click',e=>{
  const pop=document.getElementById('overflowPop');
  if(pop.style.display!=='none'&&!pop.contains(e.target)) closeOverflowPop();
});

let curDate=null,selRowId=null;
function openDay(dateStr){
  curDate=dateStr;selRowId=null;
  const[y,mo,d]=dateStr.split('-');
  document.getElementById('modalTitle').textContent=`Тренировка: ${d} ${MONTHS[parseInt(mo)-1]} ${y}`;
  document.getElementById('inPlan').value='';
  document.getElementById('inWt').value='';
  buildExSelect();syncORM();loadDayData();
  document.getElementById('mbg').classList.add('open');
}

function buildExSelect(){
  const sel=document.getElementById('exSelect');const cur=sel.value;sel.innerHTML='';
  sortedExercises().forEach(ex=>{const o=document.createElement('option');o.value=ex;o.textContent=ex;sel.appendChild(o);});
  if(cur&&exercises.includes(cur))sel.value=cur;
  syncORM();
}

function syncORM(){
  const ex=document.getElementById('exSelect').value;
  const ormIn=document.getElementById('inORM');
  ormIn.value=records[ex]!=null?records[ex]:'';
}

document.getElementById('exSelect').addEventListener('change',syncORM);

let ormTimer=null;
document.getElementById('inORM').addEventListener('input',()=>{
  clearTimeout(ormTimer);
  ormTimer=setTimeout(()=>{
    const ex=document.getElementById('exSelect').value;
    const v=parseFloat(document.getElementById('inORM').value);
    if(!isNaN(v)&&v>0)records[ex]=v;else delete records[ex];
    persist();renderHdrStats();loadDayData();
  },500);
});

function loadDayData(){
  const daySet=sets.filter(s=>s.date===curDate);
  const exOrder=[];const seen=new Set();
  [...daySet].sort((a,b)=>a.id-b.id).forEach(s=>{if(!seen.has(s.exercise)){seen.add(s.exercise);exOrder.push(s.exercise);}});
  const wrap=document.getElementById('workoutTableWrap');wrap.innerHTML='';

  if(!daySet.length){
    wrap.innerHTML='<div class="ex-cards-empty">Нет подходов — добавь первый</div>';
    renderHdrStats();return;
  }

  const maxSets=exOrder.reduce((m,ex)=>{
    const cnt=daySet.filter(s=>s.exercise===ex).length;
    return cnt>m?cnt:m;
  },0);

  const table=document.createElement('table');
  table.className='workout-table';

  // thead
  const thead=document.createElement('thead');
  let thHTML='<tr><th class="th-name">Упражнение</th><th class="th-num">%1ПМ</th><th class="th-num">Вес кг</th>';
  for(let i=1;i<=maxSets;i++) thHTML+=`<th class="th-num">${i} пдх</th>`;
  thHTML+='</tr>';
  thead.innerHTML=thHTML;
  table.appendChild(thead);

  const tbody=document.createElement('tbody');

  exOrder.forEach((ex,exIdx)=>{
    const isMain=exIdx===0;
    const exSets=daySet.filter(s=>s.exercise===ex).sort((a,b)=>a.set_number-b.set_number);
    const maxWt=Math.max(...exSets.map(s=>parseFloat(s.weight)||0));
    const weight=maxWt>0?maxWt:null;
    const pctRatio=records[ex]!=null&&weight!=null?weight/records[ex]:null;
    const pct=pctRatio!=null?Math.round(pctRatio*100)+'%':'—';
    const pctColor=pctRatio!=null?(pctRatio>=0.8?'var(--red)':pctRatio>=0.6?'var(--yellow)':'var(--green)'):'var(--txt3)';

    const tr=document.createElement('tr');

    // — название: клик = inline edit, правый клик = контекстное меню строки
    const tdName=document.createElement('td');
    tdName.className='td-name'+(isMain?' is-main':'');
    tdName.textContent=ex;
    tdName.style.cursor='default';
    tdName.addEventListener('contextmenu',e=>{
      e.preventDefault();
      showCtxMenu(e,{ex,setId:null});
    });
    tr.appendChild(tdName);

    // — %1ПМ
    const tdPct=document.createElement('td');
    tdPct.className='td-pct';tdPct.style.color=pctColor;tdPct.textContent=pct;
    tr.appendChild(tdPct);

    // — вес: клик = inline edit
    const tdWt=document.createElement('td');
    tdWt.className='td-weight';
    tdWt.textContent=weight!=null?weight+' кг':'—';
    tdWt.style.cursor='pointer';
    tdWt.addEventListener('click',e=>{
      e.stopPropagation();
      if(tdWt.querySelector('input'))return;
      const inp=document.createElement('input');
      inp.className='td-weight-input';inp.type='number';inp.min=0;inp.max=9999;inp.step=0.5;
      inp.value=weight!=null?weight:'';inp.placeholder='кг';
      tdWt.textContent='';tdWt.appendChild(inp);
      inp.focus();inp.select();
      function saveWt(){
        const v=parseFloat(inp.value);
        const newWt=isNaN(v)?null:v;
        sets.filter(s=>s.date===curDate&&s.exercise===ex).forEach(s=>s.weight=newWt);
        persist();loadDayData();renderCalendar();
      }
      inp.addEventListener('blur',saveWt);
      inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){saveWt();}e.stopPropagation();});
      inp.addEventListener('click',e=>e.stopPropagation());
    });
    tr.appendChild(tdWt);

    // — подходы
    for(let i=0;i<maxSets;i++){
      const td=document.createElement('td');td.className='td-set';
      const s=exSets[i]||null;

      if(!s){
        const cell=document.createElement('div');
        cell.className='set-cell empty';cell.textContent='+';cell.title='Добавить подход';
        cell.addEventListener('click',()=>{
          const lastSet=exSets[exSets.length-1];
          sets.push({id:nextId++,date:curDate,exercise:ex,set_number:exSets.length+1,plan:lastSet?lastSet.plan:null,fact:null,weight:lastSet?lastSet.weight:null});
          persist();loadDayData();renderCalendar();
        });
        td.appendChild(cell);
      } else {
        const cellWrap=document.createElement('div');
        cellWrap.className='set-cell-wrap';
        cellWrap.title='ПКМ — удалить подход';

        // план — кликабельный для редактирования
        const planEl=document.createElement('span');
        planEl.className='set-plan';planEl.textContent=s.plan!=null?s.plan:'—';
        planEl.style.cursor='pointer';
        planEl.addEventListener('click',e=>{
          e.stopPropagation();
          if(planEl.querySelector('input'))return;
          const inp=document.createElement('input');
          inp.type='number';inp.min=0;inp.max=999;
          inp.style.cssText='width:28px;border:none;background:transparent;font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;color:var(--accent);outline:none;text-align:center;padding:0;border-bottom:1px solid var(--accent)';
          inp.value=s.plan!=null?s.plan:'';inp.placeholder='—';
          planEl.textContent='';planEl.appendChild(inp);
          inp.focus();inp.select();
          function savePlan(){
            const v=inp.value.trim();
            s.plan=v!==''?parseInt(v):null;
            planEl.textContent=s.plan!=null?s.plan:'—';
            persist();renderCalendar();
          }
          inp.addEventListener('blur',savePlan);
          inp.addEventListener('keydown',e2=>{if(e2.key==='Enter')inp.blur();if(e2.key==='Escape'){planEl.textContent=s.plan!=null?s.plan:'—';}e2.stopPropagation();});
          inp.addEventListener('click',e2=>e2.stopPropagation());
        });

        const sep=document.createElement('span');sep.className='set-sep';sep.textContent='→';

        const factEl=document.createElement('input');
        const initDone=s.fact!=null&&s.plan!=null&&s.fact>=s.plan;
        const initFail=s.fact!=null&&s.plan!=null&&s.fact<s.plan;
        factEl.className='set-fact'+(initDone?' fact-done':initFail?' fact-fail':'');
        factEl.type='number';factEl.min='';factEl.max=999;
        factEl.value=s.fact!=null?s.fact:'';factEl.placeholder='—';
        let factTimer=null;
        factEl.addEventListener('input',()=>{
          clearTimeout(factTimer);
          factTimer=setTimeout(()=>{
            const v=factEl.value;
            s.fact=v!==''?parseInt(v):null;
            const hasFact=s.fact!=null;
            const done=hasFact&&s.plan!=null&&s.fact>=s.plan;
            const fail=hasFact&&s.plan!=null&&s.fact<s.plan;
            factEl.className='set-fact'+(done?' fact-done':fail?' fact-fail':'');
            persist();renderCalendar();
          },400);
        });
        factEl.addEventListener('keydown',e=>{if(e.key==='Enter')factEl.blur();e.stopPropagation();});
        factEl.addEventListener('click',e=>e.stopPropagation());

        // правый клик на ячейке = удалить подход
        cellWrap.addEventListener('contextmenu',e=>{
          e.preventDefault();
          showCtxMenu(e,{ex,setId:s.id});
        });

        cellWrap.appendChild(planEl);cellWrap.appendChild(sep);cellWrap.appendChild(factEl);
        td.appendChild(cellWrap);
      }
      tr.appendChild(td);
    }

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  wrap.appendChild(table);
  renderHdrStats();
}

let pendingDeleteId=null;
document.getElementById('confirmYes').addEventListener('click',()=>{
  if(pendingDeleteId==null)return;
  sets=sets.filter(s=>s.id!==pendingDeleteId);
  const exNames=[...new Set(sets.filter(s=>s.date===curDate).map(s=>s.exercise))];
  exNames.forEach(name=>{sets.filter(s=>s.date===curDate&&s.exercise===name).sort((a,b)=>a.set_number-b.set_number).forEach((s,i)=>s.set_number=i+1);});

  document.getElementById('confirmDlg').classList.remove('open');
});
document.getElementById('confirmNo').addEventListener('click',()=>{pendingDeleteId=null;document.getElementById('confirmDlg').classList.remove('open');});

document.getElementById('addSetBtn').addEventListener('click',()=>{
  const ex=document.getElementById('exSelect').value;
  const plan=parseInt(document.getElementById('inPlan').value)||null;
  const wt=parseFloat(document.getElementById('inWt').value);const weight=isNaN(wt)?null:wt;
  if(!ex||(plan===null&&weight===null))return;
  const exSets=sets.filter(s=>s.date===curDate&&s.exercise===ex);
  const setNum=exSets.length?Math.max(...exSets.map(s=>s.set_number))+1:1;
  sets.push({id:nextId++,date:curDate,exercise:ex,set_number:setNum,plan,fact:null,weight});
  document.getElementById('inPlan').value='';
  document.getElementById('inWt').value='';
  persist();loadDayData();renderCalendar();
});
['inPlan','inWt'].forEach(id=>{

});

document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('mbg').classList.remove('open'));
document.getElementById('mbg').addEventListener('click',e=>{if(e.target===document.getElementById('mbg'))document.getElementById('mbg').classList.remove('open');});

let selEx=null,edMode=null;
function renderExListbox(){
  const box=document.getElementById('exListbox');box.innerHTML='';selEx=null;
  document.getElementById('btnEdit').disabled=true;document.getElementById('btnDel').disabled=true;
  document.getElementById('btnEdit').className='ed-btn';document.getElementById('btnDel').className='ed-btn';
  sortedExercises().forEach(ex=>{
    const div=document.createElement('div');div.className='ex-listbox-item';div.textContent=ex;
    div.addEventListener('click',()=>{
      selEx=ex;document.querySelectorAll('.ex-listbox-item').forEach(d=>d.classList.remove('sel'));div.classList.add('sel');
      document.getElementById('btnEdit').disabled=false;document.getElementById('btnDel').disabled=false;
      document.getElementById('btnEdit').className='ed-btn blue';document.getElementById('btnDel').className='ed-btn red';
    });
    box.appendChild(div);
  });
}
document.getElementById('editorBtn').addEventListener('click',e=>{
  e.stopPropagation();
  const d=document.getElementById('editorDrop');
  const isOpen=d.classList.contains('open');
  d.classList.remove('open');
  if(!isOpen){
    const btn=e.currentTarget.getBoundingClientRect();
    const dropW=300;
    const dropH=260; // примерная высота
    // позиция: под кнопкой, прижато вправо
    let left=btn.right-dropW;
    let top=btn.bottom+6;
    // если не влезает снизу — открываем вверх
    if(top+dropH>window.innerHeight-20) top=btn.top-dropH-6;
    if(left<8) left=8;
    d.style.left=left+'px';
    d.style.top=top+'px';
    d.classList.add('open');
    renderExListbox();
  }
});
document.addEventListener('click',e=>{
  const drop=document.getElementById('editorDrop');
  const btn=document.getElementById('editorBtn');
  if(drop&&!drop.contains(e.target)&&e.target!==btn)drop.classList.remove('open');
});
document.getElementById('btnClose').addEventListener('click',()=>document.getElementById('editorDrop').classList.remove('open'));
document.getElementById('btnAdd').addEventListener('click',()=>{edMode='add';document.getElementById('edInputRow').style.display='flex';document.getElementById('edInput').value='';document.getElementById('edInput').focus();});
document.getElementById('btnEdit').addEventListener('click',()=>{if(!selEx)return;edMode='edit';document.getElementById('edInputRow').style.display='flex';document.getElementById('edInput').value=selEx;document.getElementById('edInput').focus();});
document.getElementById('edOk').addEventListener('click',()=>{
  const v=document.getElementById('edInput').value.trim();if(!v)return;
  if(edMode==='add'){if(!exercises.includes(v)){exercises.push(v);persist();renderExListbox();}}
  else if(edMode==='edit'&&selEx){const i=exercises.indexOf(selEx);if(i>=0){exercises[i]=v;sets.forEach(s=>{if(s.exercise===selEx)s.exercise=v;});persist();renderExListbox();renderCalendar();}}
  document.getElementById('edInputRow').style.display='none';edMode=null;
});
document.getElementById('edInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('edOk').click();});
document.getElementById('btnDel').addEventListener('click',()=>{if(!selEx)return;exercises=exercises.filter(x=>x!==selEx);persist();renderExListbox();});

let ctxTarget={ex:null,setId:null};
function showCtxMenu(e,target){
  ctxTarget=target;
  const menu=document.getElementById('ctxMenu');
  const delSet=document.getElementById('ctxDelSet');
  const sep=document.getElementById('ctxSep');
  const delEx=document.getElementById('ctxDelEx');
  const hasSet=target.setId!=null;
  // на ячейке подхода — только удалить подход
  // на названии упражнения — только удалить упражнение
  delSet.style.display=hasSet?'flex':'none';
  sep.style.display=false?'block':'none';
  delEx.style.display=hasSet?'none':'flex';
  menu.classList.add('open');
  const x=Math.min(e.clientX,window.innerWidth-180);
  const y=Math.min(e.clientY,window.innerHeight-120);
  menu.style.left=x+'px';menu.style.top=y+'px';
}
document.getElementById('ctxDelSet').addEventListener('click',()=>{
  if(ctxTarget.setId==null)return;
  sets=sets.filter(s=>s.id!==ctxTarget.setId);
  // перенумеровать подходы
  sets.filter(s=>s.date===curDate&&s.exercise===ctxTarget.ex)
      .sort((a,b)=>a.set_number-b.set_number)
      .forEach((s,i)=>s.set_number=i+1);
  persist();loadDayData();renderCalendar();
  document.getElementById('ctxMenu').classList.remove('open');
});
document.getElementById('ctxDelEx').addEventListener('click',()=>{
  if(!ctxTarget.ex)return;
  sets=sets.filter(s=>!(s.date===curDate&&s.exercise===ctxTarget.ex));
  persist();loadDayData();renderCalendar();
  document.getElementById('ctxMenu').classList.remove('open');
});

// ===== TELEGRAM SYNC =====
const TG_TOKEN='8704042897:AAGJRQUbZbwo0cUJip_t0L-99SoL3XnALLA';
const TG_CHAT='299428696';
const TG_API=`https://api.telegram.org/bot${TG_TOKEN}`;

function showToast(msg, color){
  const t=document.getElementById('syncToast');
  t.textContent=msg;
  t.style.color=color||'var(--txt)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

async function tgSave(){
  const btn=document.getElementById('syncSaveBtn');
  btn.disabled=true;btn.textContent='⏳ Сохраняю...';
  try{
    const data={sets,nextId,exercises,bodyweight,records,savedAt:new Date().toISOString()};
    const json=JSON.stringify(data);
    const payload='GYM_DATA_V1::'+btoa(unescape(encodeURIComponent(json)));
    const res=await fetch(`${TG_API}/sendMessage`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:TG_CHAT,text:payload,disable_notification:true})
    });
    const d=await res.json();
    if(d.ok){
      // запоминаем message_id последнего бэкапа
      localStorage.setItem('gd_tg_msgid', d.result.message_id);
      showToast('✅ Сохранено в Telegram','var(--green)');
    } else {
      showToast('❌ Ошибка: '+d.description,'var(--red)');
    }
  }catch(e){
    showToast('❌ Нет соединения','var(--red)');
  }
  btn.disabled=false;btn.textContent='⬆ TG';
}

async function tgLoad(){
  const btn=document.getElementById('syncLoadBtn');
  btn.disabled=true;btn.textContent='⏳ Загружаю...';
  try{
    // Способ 1: знаем message_id — копируем сообщение себе и читаем текст
    const savedMsgId=localStorage.getItem('gd_tg_msgid');
    let payload=null;

    if(savedMsgId){
      // forwardMessage чтобы получить текст через getUpdates
      const fwdRes=await fetch(`${TG_API}/copyMessage`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:TG_CHAT,from_chat_id:TG_CHAT,message_id:parseInt(savedMsgId),disable_notification:true})
      });
      const fwd=await fwdRes.json();
      if(fwd.ok){
        // теперь читаем это новое сообщение через getUpdates
        await new Promise(r=>setTimeout(r,600));
        const upd=await fetch(`${TG_API}/getUpdates?limit=10&allowed_updates=["message"]`);
        const ud=await upd.json();
        if(ud.ok&&ud.result.length){
          const msgs=ud.result.filter(u=>u.message&&u.message.text&&u.message.text.startsWith('GYM_DATA_V1::'));
          if(msgs.length) payload=msgs[msgs.length-1].message.text;
        }
      }
    }

    // Способ 2: getUpdates напрямую (работает если не читали раньше)
    if(!payload){
      const upd=await fetch(`${TG_API}/getUpdates?limit=100`);
      const ud=await upd.json();
      if(ud.ok&&ud.result.length){
        const msgs=ud.result.filter(u=>u.message&&u.message.text&&u.message.text.startsWith('GYM_DATA_V1::'));
        if(msgs.length) payload=msgs[msgs.length-1].message.text;
      }
    }

    if(!payload){
      showToast('⚠️ Сначала сохрани данные через ⬆ TG','var(--yellow)');
      btn.disabled=false;btn.textContent='⬇ TG';return;
    }

    const b64=payload.replace('GYM_DATA_V1::','');
    const json=decodeURIComponent(escape(atob(b64)));
    const data=JSON.parse(json);
    if(data.sets) sets=data.sets;
    if(data.nextId) nextId=data.nextId;
    if(data.exercises) exercises=data.exercises;
    if(data.bodyweight!=null) bodyweight=data.bodyweight;
    if(data.records) records=data.records;
    persist();renderCalendar();renderHdrStats();
    showToast('✅ Загружено из Telegram','var(--green)');
  }catch(e){
    console.error(e);
    showToast('❌ Ошибка загрузки','var(--red)');
  }
  btn.disabled=false;btn.textContent='⬇ TG';
}

document.getElementById('syncSaveBtn').addEventListener('click',tgSave);
document.getElementById('syncLoadBtn').addEventListener('click',tgLoad);
// ===== END TELEGRAM SYNC =====
