<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дневник Тренировок</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:       #0d0d12;
      --surface:  #14141c;
      --surface2: #1c1c28;
      --border:   #252535;
      --border2:  #2e2e42;
      --txt:      #e8e8f4;
      --txt2:     #9090b0;
      --txt3:     #55556a;
      --accent:   #ff4f00;
      --accent2:  #ff8c00;
      --blue:     #3b8cff;
      --green:    #00e57a;
      --red:      #ff3b5c;
      --yellow:   #ffd000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    *:focus, *:focus-visible { outline: none !important; box-shadow: none !important; -webkit-tap-highlight-color: transparent; }
    input, textarea { -webkit-user-select: text; user-select: text; caret-color: var(--accent); }
    ::selection { background: rgba(255, 79, 0, 0.4); color: inherit; }
    input:-webkit-autofill, input:-webkit-autofill:focus { transition: background-color 5000s ease-in-out 0s; -webkit-text-fill-color: var(--txt) !important; }

    body {
      font-family: 'Barlow Condensed', sans-serif;
      background: var(--bg);
      color: var(--txt);
      height: 100vh;
      display: flex;
      flex-direction: column;
      background-image:
        radial-gradient(ellipse 60% 40% at 80% -10%, rgba(255,79,0,.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 10% 100%, rgba(59,140,255,.08) 0%, transparent 50%);
    }

    /* ── ПРИЛОЖЕНИЕ ── */
    .app {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding-top: 70px;
    }

    /* ── ШАПКА ── */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 6px 0;
      margin-bottom: 30px;
      position: relative;
    }

    .hdr-nav { display: flex; align-items: center; gap: 4px }

    .nav-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--accent);
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      padding: 4px 12px;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }
    .nav-btn:hover { background: var(--border2); color: #fff }

    .month-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--txt);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── ЧИПЫ РЕКОРДОВ ── */
    .hdr-stats {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: nowrap;
      width: 100%;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 6px 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex: 1;
      min-width: 0;
      max-width: 150px;
    }
    .stat-chip:hover { background: var(--surface2); border-color: var(--accent) }

    .stat-chip-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--txt2);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .stat-chip-val {
      font-size: 13px;
      font-weight: 700;
      color: var(--txt);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .stat-chip-val.highlight { color: var(--accent2) }

    .chip-input {
      width: 60px;
      border: none;
      border-bottom: 1px solid var(--accent);
      background: transparent;
      color: var(--txt);
      font-size: 16px;
      outline: none;
      text-align: center;
      padding: 0 2px;
      font-weight: 500;
    }

    /* ── РЕДАКТОР ДРОПДАУН ── */
    .editor-drop {
      display: none;
      position: fixed;
      width: 300px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      z-index: 600;
      padding: 10px;
      box-shadow: 0 8px 40px rgba(0,0,0,.7);
    }
    .editor-drop.open { display: block }

    .editor-drop-handle {
      display: none;
      justify-content: center;
      padding: 0 0 10px;
      cursor: grab;
      touch-action: none;
    }
    .editor-drop-handle::before {
      content: '';
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border2);
    }

    .editor-drop-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--txt2);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .ex-listbox {
      border: 1px solid var(--border);
      border-radius: 10px;
      max-height: 240px;
      overflow-y: auto;
      margin-bottom: 8px;
      background: var(--bg);
    }

    .ex-listbox-item {
      padding: 6px 12px;
      font-size: 18px;
      font-weight: 500;
      color: var(--txt);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .ex-listbox-item:last-child { border-bottom: none }
    .ex-listbox-item:hover { background: var(--surface2) }
    .ex-listbox-item.sel { background: var(--accent); color: #fff }

    .editor-btns { display: grid; grid-template-columns: 1fr; gap: 4px; margin-bottom: 8px }

    .ed-btn {
      border: 1px solid var(--border2);
      background: var(--surface2);
      border-radius: 8px;
      padding: 6px 4px;
      font-size: 16px;
      cursor: pointer;
      color: var(--txt);
      font-weight: 600;
      text-align: center;
      transition: background 0.15s;
    }
    .ed-btn:hover { background: var(--border2) }

    .editor-input-row { display: flex; gap: 6px }

    .editor-input {
      flex: 1;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 16px;
      background: var(--bg);
      color: var(--txt);
      outline: none;
    }
    .editor-input:focus { border-color: var(--accent); }

    .editor-input-ok {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 16px;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    /* ── СКРОЛЛ-ОБЁРТКА КАЛЕНДАРЯ ── */
    .cal-scroll-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .cal-inner {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── ДНИ НЕДЕЛИ ── */
    .wdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid var(--border);
    }

    .wd {
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--txt2);
      padding: 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .wd.weekend { color: #8c5c70 }

    /* ── СЕТКА ── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(4, minmax(100px, 1fr));
      flex: 1;
      min-height: 0;
    }

    /* ── ЯЧЕЙКА ДЕНЬ ── */
    .day {
      min-height: 0;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 0 3px 1px;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: background 0.1s;
            -webkit-    }
    .day:nth-child(7n) { border-right: none }

    .day.month-a           { background: #0d0d12 }
    .day.month-a.weekend   { background: #0a0a10 }
    .day.month-a:hover     { background: #141420 }
    .day.month-b           { background: #161622 }
    .day.month-b.weekend   { background: #12121c }
    .day.month-b:hover     { background: #1b1b2a }

    .day.today { box-shadow: inset 0 0 0 1.5px var(--blue), 0 0 8px rgba(59,140,255,.25) }
    .day.today .dnum { color: var(--blue) }

    /* ── НОМЕР ДНЯ ── */
    .dnum {
      font-size: 10px;
      font-weight: 500;
      color: var(--txt2);
      display: block;
      line-height: 1;
      padding: 3px 3px 2px;
    }
    .day.weekend .dnum { color: #5a3a4a }

    /* ── ЧИПЫ УПРАЖНЕНИЙ ── */
    .day-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      width: 100%;
      padding: 1px 4px;
      border-radius: 4px;
      font-size: 13.5px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      line-height: 1.25;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--txt);
      cursor: pointer;
      transition: background 0.15s;
    }
    .day-chip:hover { background: var(--border) }

    .day-chip.main { background: rgba(255,79,0,.1); border-color: var(--accent) }
    .day-chip.main:hover { background: rgba(255,79,0,.2) }

    .day-chip.more {
      background: none;
      border: none;
      color: var(--txt3);
      font-size: 12px;
      padding: 2px 4px;
      font-weight: 600;
    }
    .day-chip.more:hover { color: var(--txt); background: none }

    .chip-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .chip-metrics { display: flex; align-items: center; margin-left: auto }

    .chip-weight {
      flex-shrink: 0;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: 16px;
      font-weight: 500;
      color: var(--txt);
      display: flex;
      align-items: center;
    }

    .chip-sets {
      flex-shrink: 0;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      gap: 6px;
      color: var(--txt2);
      align-items: center;
    }

    .chip-set-val { display: inline-block; width: 11px; text-align: center }

    /* ── ОВЕРЛЕЙ ── */
    .mbg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 24px 16px;
      backdrop-filter: blur(4px);
    }
    .mbg.open { display: flex }

    /* ── МОДАЛКА ── */
    .modal {
      background: var(--surface);
      border-radius: 18px;
      border: 1px solid var(--border2);
      width: min(820px, 96vw);
      margin: auto;
      overflow: hidden;
      box-shadow: 0 16px 60px rgba(0,0,0,.7);
    }

    .modal-drag-handle { display: none }

    .modal-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, var(--surface2) 0%, var(--surface) 100%);
      position: relative;
    }
    .modal-hdr::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
    }

    .modal-hdr h2 {
      font-size: 20px;
      font-weight: 800;
      color: var(--txt);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      cursor: pointer;
      font-size: 18px;
      color: var(--txt2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .modal-close:hover { background: var(--red); color: #fff; border-color: var(--red) }

    .modal-body { padding: 12px 18px }

    /* ── ПАНЕЛЬ ВВОДА ── */
    .input-bar {
      background: var(--bg);
      border-radius: 12px;
      padding: 8px 12px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border: 1px solid var(--border2);
    }

    .input-select {
      flex: 1;
      max-width: 100%;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 4px 4px;
      font-size: 20px;
      font-weight: 600;
      background: var(--surface2);
      color: var(--txt);
      outline: none;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      transition: border-color 0.15s;
    }

    .input-row { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap }

    .input-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--txt3);
      white-space: nowrap;
      width: 80px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .input-num {
      width: 80px;
      flex-shrink: 0;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 18px;
      font-weight: 500;
      background: var(--surface2);
      color: var(--txt);
      outline: none;
      text-align: center;
      transition: border-color 0.15s;
    }
    .input-num:focus { border-color: var(--accent); }

    .add-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: opacity 0.15s, transform 0.15s;
    }
    .add-btn:hover { opacity: 0.85; transform: translateY(-1px) }

    /* ── ТАБЛИЦА ТРЕНИРОВКИ ── */
    .workout-table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .workout-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 400px;
    }

    .workout-table thead tr { background: var(--bg) }

    .workout-table thead th {
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 800;
      color: var(--txt3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .workout-table thead th.th-name { text-align: left }
    .workout-table thead th.th-num  { text-align: center; width: 54px }

    .workout-table tbody tr { transition: background 0.15s }
    .workout-table tbody tr:hover td { background: var(--surface2) }
    .workout-table tbody tr:not(:last-child) td { border-bottom: 1px solid var(--border) }

    .workout-table tbody td {
      padding: 6px 12px;
      background: var(--surface);
      vertical-align: middle;
    }

    .td-num {
      font-size: 11px;
      font-weight: 500;
      color: var(--txt3);
      text-align: center;
      width: 20px;
    }

    .td-name {
      font-size: 17px;
      font-weight: 500;
      color: var(--txt);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;
      cursor: pointer;
          }
    .td-name:hover { color: var(--accent2) }
    .td-name.is-main { color: var(--accent2) }
    .td-name.is-main:hover { color: var(--accent) }

    .td-weight {
      font-size: 15px;
      font-weight: 700;
      color: var(--txt);
      white-space: nowrap;
      text-align: center;
      cursor: pointer;
    }

    .td-pct {
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      white-space: nowrap;
    }

    .td-set { text-align: center; width: 54px }

    .set-cell {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 30px;
      border-radius: 8px;
      border: 1.5px solid var(--border2);
      background: var(--surface2);
      font-size: 18px;
      font-weight: 700;
      color: var(--txt2);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .set-cell:hover { border-color: var(--accent); color: var(--txt); background: #1e1a28 }

    .set-cell.empty { border-style: dashed; color: var(--txt3); font-size: 20px; font-weight: 400 }
    .set-cell.empty:hover { border-color: var(--accent); color: var(--accent) }

    .set-cell-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      min-width: 64px;
      height: 30px;
      border-radius: 8px;
      border: 1.5px solid var(--border2);
      background: var(--surface2);
      padding: 0 6px;
      transition: border-color 0.15s;
    }
    .set-cell-wrap:focus-within { border-color: var(--accent) }

    .set-plan {
      font-size: 17px;
      font-weight: 500;
      color: var(--txt2);
      white-space: nowrap;
      flex-shrink: 0;
      cursor: pointer;
    }

    .set-sep {
      font-size: 12px;
      font-weight: 500;
      color: var(--txt3);
      flex-shrink: 0;
    }

    .set-fact {
      width: 30px;
      border: none;
      background: transparent;
      font-size: 17px;
      font-weight: 500;
      color: var(--txt2);
      outline: none;
                  text-align: center;
      padding: 0;
    }
    .set-fact::placeholder { color: var(--txt3); font-weight: 400 }
    .set-fact.fact-done { color: var(--green) }
    .set-fact.fact-fail { color: var(--red) }

    .td-weight-input {
      border: none;
      background: transparent;
      font-size: 15px;
      font-weight: 500;
      color: var(--accent);
      outline: none;
                  width: 60px;
      text-align: center;
      padding: 0;
    }

    /* Убираем стрелки у всех number-полей одним блоком */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none !important;
      appearance: none !important;
      display: none !important;
      margin: 0 !important;
    }
    input[type="number"] {
      -moz-appearance: textfield !important;
      appearance: none !important;
    }

    .ex-cards-empty {
      text-align: center;
      color: var(--txt3);
      padding: 32px;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    /* ── КОНТЕКСТНОЕ МЕНЮ ── */
    .ctx-menu {
      position: fixed;
      z-index: 1000;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
      min-width: 160px;
      display: none;
    }
    .ctx-menu.open { display: block }

    .ctx-item {
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--txt);
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .ctx-item:hover { background: var(--surface2) }
    .ctx-item.danger { color: var(--red) }
    .ctx-item.danger:hover { background: rgba(255,59,92,.12) }

    .ctx-sep { height: 1px; background: var(--border); margin: 3px 0 }

    /* ── КОПИРОВАНИЕ ── */
    .day.copied {
      box-shadow: inset 0 0 0 2px var(--accent2), 0 0 10px rgba(255,140,0,.3);
    }
    .day.copied .dnum { color: var(--accent2) }

    .day.paste-hint:hover {
      box-shadow: inset 0 0 0 2px var(--green), 0 0 8px rgba(0,229,122,.2);
      background: rgba(0,229,122,.05) !important;
    }

    #dayCtxMenu { min-width: 200px }

    /* ── ПОПАП OVERFLOW ── */
    .overflow-pop {
      display: none;
      position: fixed;
      z-index: 500;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 12px 14px 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,.7);
      min-width: 200px;
      max-width: 280px;
    }
    .overflow-pop.open { display: block }

    .overflow-pop-hdr {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .overflow-pop-date {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .overflow-pop-day {
      font-size: 22px;
      font-weight: 700;
      color: var(--txt);
      line-height: 1;
    }

    .overflow-pop-dow {
      font-size: 12px;
      font-weight: 700;
      color: var(--txt2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .overflow-pop-close {
      background: none;
      border: none;
      color: var(--txt2);
      font-size: 20px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: color 0.15s;
    }
    .overflow-pop-close:hover { color: var(--txt) }

    .overflow-pop-list .day-chip { margin-bottom: 4px }

    /* ── КНОПКА СОХРАНИТЬ РЕКОРД ── */
    .save-rec-btn {
      flex-shrink: 0;
      border: 1px solid var(--accent2);
      background: transparent;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent2);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .save-rec-btn:hover { background: var(--accent2); color: #fff }

    /* ── ТУЛТИП РЕКОРДА ── */
    .rec-tip {
      display: none;
      position: fixed;
      z-index: 700;
      background: var(--surface);
      border: 1px solid var(--accent2);
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.7);
      min-width: 180px;
      max-width: 260px;
      max-height: 320px;
      overflow-y: auto;
    }
    .rec-tip.open { display: block }
    .rec-tip-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--txt2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .rec-tip-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .rec-tip-row:last-child { border-bottom: none }
    .rec-tip-row.latest .rec-tip-row-val { color: var(--accent2) }
    .rec-tip-row-val {
      font-size: 20px;
      font-weight: 500;
      color: var(--txt);
      white-space: nowrap;
    }
    .rec-tip-row-date {
      font-size: 13px;
      font-weight: 500;
      color: var(--txt2);
      white-space: nowrap;
    }

    /* ── ЛОАДЕР ── */
    .cs-loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s;
    }
    .cs-loader.hidden { opacity: 0; pointer-events: none }

    .cs-ring {
      width: 44px;
      height: 44px;
      border: 4px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: cs-spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes cs-spin { to { transform: rotate(360deg) } }

    .cs-text {
      font-size: 18px;
      font-weight: 800;
      color: var(--txt);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── МОБАЙЛ ── */
    @media(max-width: 600px) {
      .app { padding-top: 0.6rem }

      .hdr {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        margin-bottom: 6px;
        padding: 0 0.6rem;
      }

      .month-title { font-size: 20px; min-width: 0 }

      .hdr-stats { padding: 0 0.6rem; gap: 4px }

      .stat-chip {
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 7px 4px;
        border-radius: 10px;
        gap: 2px;
        max-width: none;
      }
      .stat-chip-label { font-size: 9px; letter-spacing: 0.03em; text-align: center }
      .stat-chip-val   { font-size: 15px; text-align: center }

      .editor-drop-handle { display: flex }

      .editor-drop {
        width: calc(100vw - 16px) !important;
        left: 8px !important;
      }

      .ex-listbox { max-height: 35vh }

      .mbg { padding: 0 }

      .modal {
        width: 100vw;
        min-height: 100dvh;
        border-radius: 0;
        border: none;
        margin: 0;
        display: flex;
        flex-direction: column;
        transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
        will-change: transform;
      }

      .modal-drag-handle {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 10px 0 4px;
        cursor: grab;
        touch-action: none;
      }
      .modal-drag-handle::before {
        content: '';
        width: 40px;
        height: 4px;
        border-radius: 2px;
        background: var(--border2);
      }

      .modal-hdr { padding: 12px 8px 10px }

      .modal-body {
        flex: 1;
        overflow-y: hidden;
        padding: 0;
        display: flex;
        flex-direction: column;
      }

      .workout-table-wrap {
        flex: 1;
        overflow-y: auto;
        overflow-x: auto;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
        padding: 10px 0;
        order: 1;
      }

      .workout-table { width: max-content; min-width: 0 }

      .workout-table th.th-name,
      .workout-table td.td-name { padding-right: 20px }

      .workout-table tbody td  { padding: 6px 2px }
      .workout-table thead th  { padding: 6px 2px }

      .input-bar {
        order: 2;
        margin-bottom: 0;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-bottom: none;
        border-top: 1px solid var(--border2);
        padding: 8px 8px 12px;
        background: var(--surface);
      }

      .cal-scroll-wrap {
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .cal-scroll-wrap::-webkit-scrollbar { display: none }

      .cal-inner {
        width: calc(100vw / 2 * 7);
        min-width: calc(100vw / 2 * 7);
        display: flex;
        flex-direction: column;
      }

      .cal-grid {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-template-rows: repeat(4, 136px);
        min-height: 0;
      }

      .wdays { width: 100%; display: grid; grid-template-columns: repeat(7, 1fr) }

      .wd   { font-size: 14px; padding: 8px 0 }
      .day  { padding: 2px }
      .dnum { font-size: 12px }

      .day-chip         { font-size: 14px; padding: 1px 4px; line-height: 1.2 }
      .chip-weight      { font-size: 16px }
      .chip-sets        { font-size: 16px }

      .td-name          { font-size: 13px }
      .td-weight-input  { width: 44px }
      .set-cell-wrap    { min-width: 50px; padding: 0 2px }
      .set-fact         { font-size: 17px; width: 24px }
      .set-plan         { font-size: 17px }
    }

    /* ── ДЕСКТОП: компактная модалка ── */
    @media(min-width: 601px) {
      .modal-hdr        { padding: 10px 16px 8px }
      .modal-hdr h2     { font-size: 15px }
      .modal-close      { width: 26px; height: 26px; font-size: 14px }
      .modal-body       { padding: 8px 14px }

      .input-select     { font-size: 18px; padding: 2px 4px }
      .input-label      { font-size: 11px; width: 70px }
      .input-num        { font-size: 14px; padding: 2px 6px; width: 64px; height: 26px }
      .add-btn          { font-size: 12px; padding: 4px 10px }
      .workout-table thead th { padding: 4px 8px; font-size: 11px }
      .workout-table tbody td { padding: 4px 8px }
      .td-name          { font-size: 13px }
      .td-weight        { font-size: 13px }
      .td-pct           { font-size: 12px }
      .set-cell         { min-width: 28px; height: 24px; font-size: 14px; border-radius: 6px }
      .set-cell-wrap    { min-width: 50px; height: 24px; padding: 0 4px; gap: 2px; border-radius: 6px }
      .set-plan         { font-size: 13px }
      .set-sep          { font-size: 11px }
      .set-fact         { font-size: 13px; width: 24px }
      .ex-cards-empty   { padding: 20px; font-size: 13px }
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="hdr">
      <div class="hdr-nav">

          <div class="wd">Пн</div>

  <!-- Попап "+N ещё" -->
  <div id="overflowPop" class="overflow-pop">
    <div class="overflow-pop-hdr">

  <!-- Модалка дня -->
  <div class="mbg" id="mbg">
    <div class="modal" id="modalBox">
      <div class="modal-drag-handle" id="modalDragHandle"></div>
      <div class="modal-hdr">
        <h2 id="modalTitle"></h2>
        <button class="modal-close" id="modalClose">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div class="input-bar">
          <div style="display:flex;gap:8px;align-items:center;position:relative">
            <select class="input-select" id="exSelect" style="flex:1;margin:0"></select>
            <span style="color:var(--accent2);font-size:11px;font-weight:700;flex-shrink:0;margin-left:auto;text-transform:uppercase;letter-spacing:0.04em">1ПМ</span>
            <input class="input-num" id="inORM" type="number" inputmode="decimal" min="0" max="9999" step="0.5" placeholder="кг"
              style="color:var(--accent2);flex-shrink:0">
            <button class="save-rec-btn" id="saveRecBtn" title="Сохранить в рекорды">↑ РЕК</button>
            <div class="editor-drop" id="editorDrop">
              <div class="editor-drop-handle" id="editorDropHandle"></div>
              <div class="editor-drop-title">Упражнения</div>
              <div class="ex-listbox" id="exListbox"></div>
              <div class="editor-btns">
                <button class="ed-btn" id="btnAdd">+ Добавить упражнение</button>
              </div>
              <div id="edInputRow" style="display:none" class="editor-input-row">
                <input class="editor-input" id="edInput" maxlength="40" placeholder="Название..." />

          </div>

          </div>
