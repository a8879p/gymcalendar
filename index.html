<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дневник Тренировок</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function() {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      if (tg.requestFullscreen) tg.requestFullscreen();
    })();
  </script>
  <style>
    :root {
      --bg: #0d0d12;
      --surface: #14141c;
      --surface2: #1c1c28;
      --border: #252535;
      --border2: #2e2e42;
      --txt: #e8e8f4;
      --txt2: #9090b0;
      --txt3: #55556a;
      --accent: #ff4f00;
      --accent2: #ff8c00;
      --blue: #3b8cff;
      --green: #00e57a;
      --red: #ff3b5c;
      --yellow: #ffd000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--txt);
      height: 100vh;
      display: flex;
      flex-direction: column;
      background-image:
        radial-gradient(ellipse 60% 40% at 80% -10%, rgba(255, 79, 0, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 10% 100%, rgba(59, 140, 255, 0.08) 0%, transparent 50%);
    }

    .wrapper {
      padding: 0.5rem 1rem 0.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 100%;
    }

    /* ШАПКА */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 2px 0;
      margin-bottom: 0.5rem;
      position: relative
    }

    .hdr-nav {
      display: flex;
      align-items: center;
      gap: 4px
    }

    .nav-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--accent);
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      padding: 4px 12px;
      line-height: 1;
      transition: all 0.15s;
    }

    .nav-btn:hover {
      background: var(--border2);
      color: #fff
    }

    .month-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--txt);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .editor-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 7px 36px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--txt2);
      transition: all 0.15s;
      letter-spacing: 0.02em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .editor-btn:hover {
      background: var(--border2);
      color: var(--txt)
    }

    /* РЕДАКТОР ДРОПДАУН */
    .editor-drop {
      display: none;
      position: fixed;
      width: 300px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      z-index: 600;
      padding: 14px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
      touch-action: none;
    }

    .editor-drop.open {
      display: block
    }

    .editor-drop-handle {
      display: none;
      justify-content: center;
      padding: 0 0 10px;
      cursor: grab;
      touch-action: none;
    }

    .editor-drop-handle::before {
      content: '';
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border2);
    }

    @media(max-width:600px) {
      .editor-drop-handle { display: flex }
    }

    .editor-drop-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--txt2);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em
    }

    .ex-listbox {
      border: 1px solid var(--border);
      border-radius: 10px;
      max-height: 240px;
      overflow-y: auto;
      margin-bottom: 8px;
      background: var(--bg)
    }

    .ex-listbox-item {
      padding: 9px 12px;
      font-size: 16px;
      color: var(--txt);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s
    }

    .ex-listbox-item:last-child {
      border-bottom: none
    }

    .ex-listbox-item:hover {
      background: var(--surface2)
    }

    .ex-listbox-item.sel {
      background: var(--accent);
      color: #fff
    }

    .editor-btns {
      display: grid;
      grid-template-columns: 1fr;
      gap: 4px;
      margin-bottom: 8px
    }

    .ed-btn {
      border: 1px solid var(--border2);
      background: var(--surface2);
      border-radius: 8px;
      padding: 7px 4px;
      font-size: 14px;
      cursor: pointer;
      color: var(--txt);
      font-weight: 600;
      text-align: center;
      transition: all 0.15s
    }

    .ed-btn:hover {
      background: var(--border2)
    }

    .editor-input-row {
      display: flex;
      gap: 6px
    }

    .editor-input {
      flex: 1;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 16px;
      background: var(--bg);
      color: var(--txt);
      outline: none
    }

    .editor-input:focus {
      border-color: var(--accent)
    }

    .editor-input-ok {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 16px;
      color: #fff;
      cursor: pointer;
      font-weight: 700
    }

    /* СКРОЛЛ-ОБЁРТКА КАЛЕНДАРЯ */
    .cal-scroll-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .cal-inner {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column
    }

    /* ДНИ НЕДЕЛИ */
    .wdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      border-bottom: 1px solid var(--border)
    }

    .wd {
      text-align: center;
      font-family: 'Barlow', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--txt2);
      padding: 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .wd.weekend {
      color: #8c5c70
    }

    /* СЕТКА */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(4, minmax(100px, 1fr));
      gap: 0;
      flex: 1;
      min-height: 0
    }

    /* ЯЧЕЙКА ДЕНЬ */
    .day {
      min-height: 0;
      background: var(--bg);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 0 3px 1px;
      cursor: pointer;
      overflow: hidden;
      position: relative;
    }

    .day:nth-child(7n) {
      border-right: none
    }

    .day:hover {
      background: #141420
    }

    .day.empty {
      background: var(--bg);
      cursor: default;
      pointer-events: none;
      opacity: 0.4
    }

    .day.weekend {
      background: #0c0c14
    }

    .day.weekend:hover {
      background: #111118
    }

    /* чередование месяцев */
    .day.month-a {
      background: #0d0d12
    }

    .day.month-a.weekend {
      background: #0a0a10
    }

    .day.month-a:hover {
      background: #141420
    }

    .day.month-b {
      background: #161622
    }

    .day.month-b.weekend {
      background: #12121c
    }

    .day.month-b:hover {
      background: #1b1b2a
    }

    /* сегодня */
    .day.today .dnum {
      color: var(--blue);
    }

    .day.today {
      box-shadow: inset 0 0 0 1.5px var(--blue), 0 0 8px rgba(59, 140, 255, 0.25);
    }

    /* номер дня */
    .dnum {
      font-family: 'Barlow', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: var(--txt2);
      display: block;
      line-height: 1;
      min-width: 14px;
      text-align: left;
      margin: 0;
      padding: 3px 3px 2px;
    }

    .day.weekend .dnum {
      color: #5a3a4a
    }

    /* ЧИПЫ УПРАЖНЕНИЙ (Темный дизайн для видимости зелено/красных цифр) */
    .day-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      width: 100%;
      margin-bottom: 0px;
      padding: 1px 4px;
      border-radius: 4px;
      font-family: 'Barlow', sans-serif;
      font-size: 13.5px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      line-height: 1.25;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--txt);
      cursor: pointer;
      box-sizing: border-box;
    }

    .day-chip:hover {
      background: var(--border)
    }

    .day-chip .chip-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .day-chip .chip-metrics {
      display: flex;
      align-items: center;
      margin-left: auto;
      gap: 0px;
    }

    .day-chip .chip-weight {
      flex-shrink: 0;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--txt);
      display: flex;
      align-items: center;
    }

    .day-chip .chip-sets {
      flex-shrink: 0;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      gap: 6px;
      color: var(--txt2);
      align-items: center;
    }

    .day-chip .chip-set-val {
      display: inline-block;
      width: 11px;
      text-align: center;
    }

    .day-chip.main {
      background: rgba(255, 79, 0, 0.1);
      border-color: var(--accent);
    }

    .day-chip.main:hover {
      background: rgba(255, 79, 0, 0.2)
    }

    .day-chip.more {
      background: none;
      border: none;
      color: var(--txt3);
      font-size: 12px;
      padding: 2px 4px;
      font-weight: 600;
      cursor: pointer
    }

    .day-chip.more:hover {
      color: var(--txt);
      background: none
    }

    /* ОВЕРЛЕЙ */
    .mbg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 24px 16px;
      backdrop-filter: blur(4px)
    }

    .mbg.open {
      display: flex
    }

    .modal {
      background: var(--surface);
      border-radius: 18px;
      border: 1px solid var(--border2);
      width: min(820px, 96vw);
      margin: auto;
      overflow: hidden;
      box-shadow: 0 16px 60px rgba(0, 0, 0, 0.7);
    }

    .modal-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, var(--surface2) 0%, var(--surface) 100%);
      position: relative;
    }

    .modal-hdr::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
    }

    .modal-hdr h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--txt);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      cursor: pointer;
      font-size: 18px;
      color: var(--txt2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .modal-close:hover {
      background: var(--red);
      color: #fff;
      border-color: var(--red)
    }

    .modal-body {
      padding: 18px 24px
    }

    /* ПАНЕЛЬ ВВОДА */
    .input-bar {
      background: var(--bg);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1px solid var(--border2);
    }

    .input-select {
      flex: 1;
      max-width: 100%;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 8px 2px;
      font-size: 16px;
      font-weight: 600;
      background: var(--surface2);
      color: var(--txt);
      outline: none;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
    }

    .input-select:focus {
      border-color: var(--accent)
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap
    }

    .input-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--txt3);
      white-space: nowrap;
      width: 80px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em
    }

    .input-num {
      width: 80px;
      flex-shrink: 0;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 19px;
      font-weight: 600;
      background: var(--surface2);
      color: var(--txt);
      outline: none;
      text-align: center;
      font-family: 'Barlow', sans-serif
    }

    .input-num:focus {
      border-color: var(--accent)
    }

    .add-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: all 0.15s;
      font-family: 'Barlow', sans-serif;
    }

    .add-btn:hover {
      opacity: 0.85;
      transform: translateY(-1px)
    }

    /* ТАБЛИЦА ТРЕНИРОВКИ */
    .workout-table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border)
    }

    .workout-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Barlow', sans-serif;
      min-width: 400px
    }

    .workout-table thead tr {
      background: var(--bg)
    }

    .workout-table thead th {
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 800;
      color: var(--txt3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .workout-table thead th.th-name {
      text-align: left
    }

    .workout-table thead th.th-num {
      text-align: center;
      width: 54px
    }

    .workout-table tbody tr {
      transition: background 0.12s
    }

    .workout-table tbody tr:hover td {
      background: var(--surface2)
    }

    .workout-table tbody tr:not(:last-child) td {
      border-bottom: 1px solid var(--border)
    }

    .workout-table tbody td {
      padding: 10px 14px;
      background: var(--surface);
      vertical-align: middle;
    }

    .td-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--txt);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .td-name.is-main {
      color: var(--accent2)
    }

    .td-weight {
      font-size: 16px;
      font-weight: 700;
      color: var(--txt);
      white-space: nowrap;
      text-align: center;
    }

    .td-pct {
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      white-space: nowrap;
      border-radius: 6px;
    }

    .td-set {
      text-align: center;
      width: 54px
    }

    .set-cell {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 36px;
      border-radius: 8px;
      border: 1.5px solid var(--border2);
      background: var(--surface2);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 19px;
      font-weight: 700;
      color: var(--txt2);
      cursor: pointer;
      transition: all 0.12s;
      position: relative;
    }

    .set-cell:hover {
      border-color: var(--accent);
      color: var(--txt);
      background: #1e1a28
    }

    .set-cell.empty {
      border-style: dashed;
      color: var(--txt3);
      font-size: 22px;
      font-weight: 400
    }

    .set-cell.empty:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    /* КОНТЕКСТНОЕ МЕНЮ */
    .ctx-menu {
      position: fixed;
      z-index: 1000;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 4px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      min-width: 160px;
      display: none;
    }

    .ctx-menu.open {
      display: block
    }

    .ctx-item {
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--txt);
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.1s;
      white-space: nowrap;
    }

    .ctx-item:hover {
      background: var(--surface2)
    }

    .ctx-item.danger {
      color: var(--red)
    }

    .ctx-item.danger:hover {
      background: rgba(255, 59, 92, 0.12)
    }

    .ctx-sep {
      height: 1px;
      background: var(--border);
      margin: 3px 0
    }

    .td-weight-input {
      border: none;
      background: transparent;
      font-family: 'Barlow', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      outline: none;
      width: 64px;
      text-align: center;
      border-bottom: 1.5px solid var(--accent);
      padding: 0;
    }

    .td-weight-input::-webkit-inner-spin-button,
    .td-weight-input::-webkit-outer-spin-button {
      -webkit-appearance: none
    }

    .set-cell-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      min-width: 64px;
      height: 36px;
      border-radius: 8px;
      border: 1.5px solid var(--border2);
      background: var(--surface2);
      padding: 0 6px;
      transition: border-color 0.12s;
    }

    .set-cell-wrap:focus-within {
      border-color: var(--accent)
    }

    .set-plan {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--txt2);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .set-sep {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--txt3);
      flex-shrink: 0
    }

    .set-fact {
      width: 32px;
      border: none;
      background: transparent;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--txt2);
      outline: none;
      text-align: center;
      padding: 0;
    }

    .set-fact::-webkit-inner-spin-button,
    .set-fact::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0
    }

    .set-fact::placeholder {
      color: var(--txt3);
      font-weight: 400
    }

    .set-fact.fact-done {
      color: var(--green)
    }

    .set-fact.fact-fail {
      color: var(--red)
    }

    .ex-cards-empty {
      text-align: center;
      color: var(--txt3);
      padding: 32px;
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em
    }

    .plan-fact-row {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .pf-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--txt3);
      white-space: nowrap;
      width: 36px;
      text-align: right;
      text-transform: uppercase;
      letter-spacing: 0.04em
    }

    .pf-input {
      width: 64px;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 7px 6px;
      font-size: 16px;
      background: var(--surface2);
      color: var(--txt);
      outline: none;
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 500
    }

    .pf-input:focus {
      border-color: var(--accent)
    }

    .pf-input::-webkit-inner-spin-button,
    .pf-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0
    }

    .pf-input {
      -moz-appearance: textfield
    }

    .no-arrows::-webkit-inner-spin-button,
    .no-arrows::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0
    }

    .no-arrows {
      -moz-appearance: textfield
    }

    .input-num::-webkit-inner-spin-button,
    .input-num::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0
    }

    .input-num {
      -moz-appearance: textfield
    }

    /* ЧИПЫ РЕКОРДОВ */
    .hdr-stats {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: nowrap;
      width: 100%
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 6px 8px;
      cursor: pointer;
      transition: all 0.15s;
      flex: 1;
      min-width: 0;
      max-width: 150px;
    }

    .stat-chip:hover {
      background: var(--surface2);
      border-color: var(--accent)
    }

    .stat-chip-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--txt2);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0
    }

    .stat-chip-val {
      font-size: 13px;
      font-weight: 700;
      color: var(--txt);
      white-space: nowrap;
      flex-shrink: 0
    }

    .stat-chip-val.highlight {
      color: var(--accent2)
    }

    .chip-input {
      width: 60px;
      border: none;
      border-bottom: 1px solid var(--accent);
      background: transparent;
      color: var(--txt);
      font-size: 16px;
      outline: none;
      text-align: center;
      padding: 0 2px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 500
    }


    /*----------- МЕДИАЗАПРОСЫ (Все для мобильных) -----------*/
    @media(max-width:600px) {
      .editor-drop {
        width: calc(100vw - 16px) !important;
        left: 8px !important
      }

      .ex-listbox {
        max-height: 35vh
      }

      .mbg {
        padding: 0
      }

      .modal {
        width: 100vw;
        min-height: 100dvh;

        display: flex;

      }

      .workout-table-wrap {

      .input-bar {

      .app {

      .hdr {

      }

      }

      }

      .stat-chip {

      }

      .cal-grid {
        width: 100%;

        grid-template-columns: repeat(7, 1fr);

    /* loaders */

      position: fixed;
      inset: 0;

      z-index: 9999;
      display: flex;

    }

    .cs-ring {
      width: 44px;

      border: 4px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: cs-spin 0.8s linear infinite;

    .cs-text {

      font-weight: 800;

    }
  </style>
</head>

<body>

  <!-- попап "+N more" -->

    style="display:none;position:fixed;z-index:500;background:#2a2a38;border-radius:14px;padding:12px 14px 10px;box-shadow:0 8px 32px rgba(0,0,0,0.7);min-width:200px;max-width:280px">

              style="width:auto;color:var(--accent2);font-size:11px;font-weight:700;flex-shrink:0;margin-left:auto">1ПМ</span>

              style="color:var(--accent2);flex-shrink:0">

  <div class="ctx-menu" id="ctxMenu">

  <div id="csLoader" class="cs-loader">
    <div class="cs-ring"></div>
    <div class="cs-text">СИНХРОНИЗАЦИЯ...</div>
  </div>

  <script>
    const TM = window.Telegram?.WebApp;
    const isTg = !!TM?.initData;
    if (isTg) { 
      TM.expand(); 
      TM.ready(); 
    }
    const MONTHS = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
    const PINNED = ['Приседания', 'Жим лёжа', 'Становая тяга'];
    const REST = ['Подтягивания', 'Жим стоя', 'Тяга штанги', 'Отжимания', 'Жим гантелей', 'Планка', 'Скручивания'];

    let exercises = [...PINNED, ...REST];
    let setsByDate = {};
    let nextId = 1;
    let bodyweight = null;
    let records = {};
    let pendingCloudSaves = new Set();
    let dirtyDates = new Set();
    let persistTimer = null;

    try {
      const old = localStorage.getItem('gd_sets2');
      if (old) {
        const d = JSON.parse(old);
        const sbd = d.setsByDate || {};
        if (Array.isArray(d.sets)) {
          d.sets.forEach(s => {
            if (!sbd[s.date]) sbd[s.date] = [];
            sbd[s.date].push(s);
          });
        }
        Object.keys(sbd).forEach(k => {
          localStorage.setItem('gd_d_' + k, JSON.stringify(sbd[k]));
        });
        localStorage.setItem('gd_meta', JSON.stringify({ nextId: d.nextId || 1 }));
        localStorage.removeItem('gd_sets2');
      }
    } catch (e) { }

    function initLocalData() {
      setsByDate = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('gd_d_')) {
          try { setsByDate[k.replace('gd_d_', '')] = JSON.parse(localStorage.getItem(k)); } catch (e) { }
        }
      }
      try { const s = localStorage.getItem('gd_meta'); if (s) nextId = JSON.parse(s).nextId || 1; } catch (e) { }
      try { const s = localStorage.getItem('gd_ex2'); if (s) exercises = JSON.parse(s); } catch (e) { }
      try { const s = localStorage.getItem('gd_bw'); if (s) bodyweight = parseFloat(s); } catch (e) { }
      try { const s = localStorage.getItem('gd_rec'); if (s) records = JSON.parse(s); } catch (e) { }
    }
    initLocalData();

    function persistImmediately() {
      try {
        localStorage.setItem('gd_meta', JSON.stringify({ nextId }));
        pendingCloudSaves.add('gd_meta');

        localStorage.setItem('gd_ex2', JSON.stringify(exercises));
        pendingCloudSaves.add('gd_ex2');

        if (bodyweight != null) {
          localStorage.setItem('gd_bw', String(bodyweight));
          pendingCloudSaves.add('gd_bw');
        }

        localStorage.setItem('gd_rec', JSON.stringify(records));
        pendingCloudSaves.add('gd_rec');

        dirtyDates.forEach(date => {
          if (setsByDate[date] && setsByDate[date].length > 0) {
            localStorage.setItem('gd_d_' + date, JSON.stringify(setsByDate[date]));
            pendingCloudSaves.add('gd_d_' + date);
          } else {
            localStorage.removeItem('gd_d_' + date);
            pendingCloudSaves.add('DEL:gd_d_' + date);
          }
        });
        dirtyDates.clear();
        syncDirtyKeysToCloud();
      } catch (e) { }
    }

    function persist() {
      if (curDate) dirtyDates.add(curDate);
      clearTimeout(persistTimer);
      persistTimer = setTimeout(persistImmediately, 500);
    }

    function syncDirtyKeysToCloud() {
      if (!isTg) return;
      const keysArray = Array.from(pendingCloudSaves);
      pendingCloudSaves.clear();

      keysArray.forEach(k => {
        if (k.startsWith('DEL:')) {
          TM.CloudStorage.removeItem(k.replace('DEL:', ''), (err) => {
            if (err) pendingCloudSaves.add(k);
          });
        } else {
          const v = localStorage.getItem(k);
          if (v) {
            TM.CloudStorage.setItem(k, v, (err) => {
              if (err) pendingCloudSaves.add(k);
            });
          }
        }
      });
    }

    function syncCloudToLocal() {
      if (!isTg) { document.getElementById('csLoader').classList.add('hidden'); return; }
      TM.CloudStorage.getKeys((err, keys) => {
        if (err) {
          TM.showAlert('Ошибка сети при синхронизации. Загружен локальный кэш.');
          finishCloudSync();
          return;
        }
        if (!keys || !keys.length) {
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k && k.startsWith('gd_')) TM.CloudStorage.setItem(k, localStorage.getItem(k));
          }
          finishCloudSync();
          return;
        }
        TM.CloudStorage.getItems(keys, (e, vals) => {
          if (e) {
            TM.showAlert('Ошибка загрузки данных из облака. Загружен локальный кэш.');
          } else if (vals) {
            Object.keys(vals).forEach(k => {
              localStorage.setItem(k, vals[k]);
            });
            initLocalData();
          }
          finishCloudSync();
        });
      });
    }

    function finishCloudSync() {
      document.getElementById('csLoader').classList.add('hidden');
      buildExSelect();
      renderHdrStats();
      renderCalendar();
      if (curDate) loadDayData();
    }

    window.addEventListener('load', syncCloudToLocal);

    function limitNum(el) { if (!el) return; el.addEventListener('input', () => { let v = el.value.replace(/[^0-9.]/g, ''); const p = v.split('.'); if (p[0].length > 4) p[0] = p[0].slice(0, 4); v = p.length > 1 ? p[0] + '.' + p[1].slice(0, 1) : p[0]; if (el.value !== v) el.value = v; }); }
    limitNum(document.getElementById('inPlan'));
    limitNum(document.getElementById('inWt'));
    limitNum(document.getElementById('inORM'));

    const REC_EX = ['Становая тяга', 'Жим лёжа', 'Приседания'];
    function renderHdrStats() {
      document.getElementById('valBodyweight').textContent = bodyweight != null ? `${bodyweight} кг` : '— кг';
      REC_EX.forEach(ex => {
        const el = document.getElementById('rec' + ex);
        if (el) el.textContent = records[ex] != null ? `${records[ex]} кг` : '— кг';
      });
    }
    renderHdrStats();

    document.getElementById('chipBodyweight').addEventListener('click', () => {
      const valEl = document.getElementById('valBodyweight');
      if (valEl.tagName === 'INPUT') return;
      const inp = document.createElement('input');
      inp.className = 'chip-input'; inp.type = 'number'; inp.min = 0; inp.max = 999; inp.step = 0.1;
      inp.value = bodyweight || ''; inp.placeholder = 'кг';
      valEl.replaceWith(inp); inp.focus(); inp.select();
      function save() {
        const v = parseFloat(inp.value);
        bodyweight = isNaN(v) ? null : v;
        persist();
        const newEl = document.createElement('span');
        newEl.id = 'valBodyweight'; newEl.className = 'stat-chip-val';
        newEl.textContent = bodyweight != null ? `${bodyweight} кг` : '— кг';
        inp.replaceWith(newEl);
      }
      inp.addEventListener('blur', save);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') { inp.value = ''; inp.blur(); } });
    });

    const now = new Date();
    now.setHours(0, 0, 0, 0);

    function getMondayOf(date) {
      const d = new Date(date);
      const dow = d.getDay();
      const diff = (dow === 0) ? -6 : 1 - dow;
      d.setDate(d.getDate() + diff);
      return d;
    }
    let anchorMonday = getMondayOf(now);
    anchorMonday.setDate(anchorMonday.getDate() - 7);

    function dkey(y, m, d) { return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`; }
    function dateToKey(d) { return dkey(d.getFullYear(), d.getMonth(), d.getDate()); }
    const todayStr = dateToKey(now);
    const MONTHS_SHORT = ['янв', 'фев', 'мар', 'апр', 'май', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];
    const WEEKS = 4;
    const DAYS_RU = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];

    function getWorkoutsForRange(startDate, endDate) {
      const byDate = {};
      for (let m = new Date(startDate); m <= endDate; m.setDate(m.getDate() + 1)) {
        const k = dateToKey(m);
        const daySets = setsByDate[k];
        if (!daySets || daySets.length === 0) continue;

        const exByDate = {};
        daySets.forEach(s => {
          if (!exByDate[s.exercise]) exByDate[s.exercise] = [];
          exByDate[s.exercise].push(s);
        });

        const orderedEx = [...new Set(daySets.map(s => s.exercise))];
        byDate[k] = [];
        orderedEx.forEach(ex => {
          const exSets = exByDate[ex];
          const maxWt = Math.max(...exSets.map(s => parseFloat(s.weight) || 0));
          const sortedSets = [...exSets].sort((a, b) => a.set_number - b.set_number);

          const setsNums = sortedSets.map(s => {
            let v = s.fact != null ? String(s.fact) : s.plan != null ? String(s.plan) : '—';
            let style = '';
            if (s.fact != null && s.plan != null) {
              const clr = s.fact >= s.plan ? 'var(--green)' : 'var(--red)';
              style = `color:${clr}`;
            }
            return `<span class="chip-set-val" style="${style}">${v}</span>`;
          }).join('');

          const pctRatio = records[ex] != null && maxWt > 0 ? maxWt / records[ex] : null;
          const wtColor = pctRatio != null ? (pctRatio >= 0.8 ? 'var(--red)' : pctRatio >= 0.6 ? 'var(--yellow)' : 'var(--green)') : 'var(--txt)';

          byDate[k].push({ label: ex, weight: maxWt > 0 ? `<span style="color:${wtColor}">${maxWt}</span><span style="font-size:14px;color:var(--txt3);margin:0 0 0 1px;font-family:'Barlow', sans-serif">×</span>` : '', sets: setsNums });
        });
      }
      return byDate;
    }

    function getMaxChips() {
      const isMobile = window.innerWidth <= 600;
      let cellH = isMobile ? 136 : 130;
      if (!isMobile) {
        const bodyH = document.body.clientHeight;
        if (bodyH > 0) {
          const h = bodyH - 100; // Высота шапки (месяц+рекорды+паддинги+дни недели)
          if (h > 0) cellH = h / 4;
        }
      }
      const avail = cellH - (isMobile ? 16 : 14);
      const chipH = 21;
      let max = Math.floor(avail / chipH);
      return max < 4 ? 4 : max;
    }

    function renderDayChips(el, k, exList) {
      const dnum = el.querySelector('.dnum');
      el.innerHTML = '';
      if (dnum) el.appendChild(dnum);

      const MAX = getMaxChips();
      const total = exList.length;

      let showCount = total;
      if (total > MAX) {
        showCount = MAX - 1;
      }

      exList.slice(0, showCount).forEach((item, idx) => {
        const chip = document.createElement('span');
        let chipClass = 'day-chip';
        if (idx === 0) chipClass += ' main';
        chip.className = chipClass;
        chip.innerHTML = `<span class="chip-label">${item.label}</span><div class="chip-metrics">${item.weight ? `<span class="chip-weight">${item.weight}</span>` : ''}<span class="chip-sets">${item.sets}</span></div>`;
        chip.addEventListener('click', e => { e.stopPropagation(); openDay(k); });
        el.appendChild(chip);
      });

      if (total > MAX) {
        const more = document.createElement('span');
        more.className = 'day-chip more';
        more.textContent = `+${total - showCount} ещё`;
        more.addEventListener('click', e => {
          e.stopPropagation();
          const parts = k.split('-');
          const dObj = new Date(parts[0], parts[1] - 1, parts[2]);
          showOverflowPop(k, parseInt(parts[2], 10), dObj.getDay(), exList, more);
        });
        el.appendChild(more);
      }
    }

    function updateDayInCalendar(dateKey) {
      const el = document.getElementById('day-' + dateKey);
      if (!el) return;
      const rawSet = setsByDate[dateKey] || [];
      const exByDate = {};
      rawSet.forEach(s => {
        if (!exByDate[s.exercise]) exByDate[s.exercise] = [];
        exByDate[s.exercise].push(s);
      });
      const orderedEx = [...new Set(rawSet.map(s => s.exercise))];
      const exList = [];
      orderedEx.forEach(ex => {
        const exSets = exByDate[ex];
        const maxWt = Math.max(...exSets.map(s => parseFloat(s.weight) || 0));
        const sortedSets = [...exSets].sort((a, b) => a.set_number - b.set_number);

        const setsNums = sortedSets.map(s => {
          let v = s.fact != null ? String(s.fact) : s.plan != null ? String(s.plan) : '—';
          let style = '';
          if (s.fact != null && s.plan != null) {
            const clr = s.fact >= s.plan ? 'var(--green)' : 'var(--red)';
            style = `color:${clr}`;
          }
          return `<span class="chip-set-val" style="${style}">${v}</span>`;
        }).join('');

        const pctRatio = records[ex] != null && maxWt > 0 ? maxWt / records[ex] : null;
        const wtColor = pctRatio != null ? (pctRatio >= 0.8 ? 'var(--red)' : pctRatio >= 0.6 ? 'var(--yellow)' : 'var(--green)') : 'var(--txt)';

        exList.push({ label: ex, weight: maxWt > 0 ? `<span style="color:${wtColor}">${maxWt}</span><span style="font-size:14px;color:var(--txt3);margin:0 0 0 1px;font-family:'Barlow', sans-serif">×</span>` : '', sets: setsNums });
      });
      renderDayChips(el, dateKey, exList);
    }

    function renderCalendar() {
      const startDate = new Date(anchorMonday);
      const endDate = new Date(anchorMonday);
      endDate.setDate(startDate.getDate() + WEEKS * 7 - 1);

      const sm = startDate.getMonth(), em = endDate.getMonth();
      const sy = startDate.getFullYear(), ey = endDate.getFullYear();
      let title;
      if (sy === ey && sm === em) title = `${MONTHS[sm]} ${sy}`;
      else if (sy === ey) title = `${MONTHS[sm]} — ${MONTHS[em]} ${sy}`;
      else title = `${MONTHS[sm]} ${sy} — ${MONTHS[em]} ${ey}`;
      document.getElementById('monthTitle').textContent = title;

      const g = document.getElementById('calGrid'); g.innerHTML = '';
      const workouts = getWorkoutsForRange(startDate, endDate);

      for (let i = 0; i < WEEKS * 7; i++) {
        const cur = new Date(startDate);
        cur.setDate(startDate.getDate() + i);
        const k = dateToKey(cur);
        const d = cur.getDate();
        const m = cur.getMonth();
        const dow = cur.getDay();
        const isWeekend = dow === 0 || dow === 6;
        const isFirstOfMonth = d === 1;

        const el = document.createElement('div');
        const cls = ['day'];
        if (k === todayStr) cls.push('today');
        if (isWeekend) cls.push('weekend');
        cls.push(m % 2 === 0 ? 'month-a' : 'month-b');
        el.className = cls.join(' ');
        el.id = 'day-' + k;

        const dnum = document.createElement('span');
        dnum.className = 'dnum';
        if (isFirstOfMonth) {
          dnum.innerHTML = `<span style="font-size:10px;color:var(--accent2);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;display:inline-block;margin-right:4px;">${MONTHS_SHORT[m]}</span>${d}`;
        } else { dnum.textContent = d; }
        el.appendChild(dnum);

        const exList = workouts[k] || [];
        renderDayChips(el, k, exList);

        el.addEventListener('click', () => openDay(k));
        g.appendChild(el);
      }
    }

    function showOverflowPop(dateKey, d, dow, exList, anchor) {
      const pop = document.getElementById('overflowPop');
      document.getElementById('ovDow').textContent = DAYS_RU[dow];
      document.getElementById('ovDay').textContent = d;
      const list = document.getElementById('ovList');
      list.innerHTML = '';
      exList.forEach((item, idx) => {
        const chip = document.createElement('div');
        let chipClass = 'day-chip';
        if (idx === 0) chipClass += ' main';
        chip.className = chipClass;
        chip.style.marginBottom = '4px';
        chip.innerHTML = `<span class="chip-label">${item.label}</span><div class="chip-metrics">${item.weight ? `<span class="chip-weight">${item.weight}</span>` : ''}<span class="chip-sets">${item.sets}</span></div>`;
        chip.addEventListener('click', () => { closeOverflowPop(); openDay(dateKey); });
        list.appendChild(chip);
      });

      const rect = anchor.getBoundingClientRect();
      pop.style.display = 'block';
      const pw = pop.offsetWidth || 220;
      const ph = pop.offsetHeight || 200;
      let left = rect.left;
      let top = rect.bottom + 4;
      if (left + pw > window.innerWidth - 12) left = window.innerWidth - pw - 12;
      if (top + ph > window.innerHeight - 12) top = rect.top - ph - 4;
      pop.style.left = left + 'px'; pop.style.top = top + 'px';
    }

    document.addEventListener('click', e => {

    function buildExSelect() {
      const sel = document.getElementById('exSelect'); const cur = sel.value; sel.innerHTML = '';
      sortedExercises().forEach(ex => { const o = document.createElement('option'); o.value = ex; o.textContent = ex; sel.appendChild(o); });

      syncORM();

    function syncORM() {
      const ex = document.getElementById('exSelect').value;
      const ormIn = document.getElementById('inORM');
      ormIn.value = records[ex] != null ? records[ex] : '';
    }

    document.getElementById('exSelect').addEventListener('change', syncORM);

    let ormTimer = null;
    document.getElementById('inORM').addEventListener('input', () => {
      clearTimeout(ormTimer);
      ormTimer = setTimeout(() => {
        const ex = document.getElementById('exSelect').value;
        const v = parseFloat(document.getElementById('inORM').value);
        if (!isNaN(v) && v > 0) records[ex] = v; else delete records[ex];
        persist(); renderHdrStats();
      }, 500);
    });

    function sortedExercises() { const p = exercises.filter(e => PINNED.includes(e)).sort((a, b) => PINNED.indexOf(a) - PINNED.indexOf(b)); const r = exercises.filter(e => !PINNED.includes(e)).sort(); return [...p, ...r]; }

    function loadDayData() {
      const daySet = setsByDate[curDate] || [];
      const exOrder = []; const seen = new Set();
      [...daySet].sort((a, b) => a.id - b.id).forEach(s => { if (!seen.has(s.exercise)) { seen.add(s.exercise); exOrder.push(s.exercise); } });
      const wrap = document.getElementById('workoutTableWrap'); wrap.innerHTML = '';

      if (!daySet.length) {
        wrap.innerHTML = '<div class="ex-cards-empty">Нет подходов — добавь первый</div>';
        renderHdrStats(); return;
      }

      const maxSets = exOrder.reduce((m, ex) => {
        const cnt = daySet.filter(s => s.exercise === ex).length;
        return cnt > m ? cnt : m;
      }, 0);

      const table = document.createElement('table');
      table.className = 'workout-table';

      const thead = document.createElement('thead');
      let thHTML = '<tr><th class="th-num" style="width:20px;color:var(--txt3)">#</th><th class="th-name">Упражнение</th><th class="th-num">%1ПМ</th><th class="th-num">Вес кг</th>';
      for (let i = 1; i <= maxSets; i++) thHTML += `<th class="th-num">${i} пдх</th>`;
      thHTML += '</tr>';
      thead.innerHTML = thHTML;
      table.appendChild(thead);

      const tbody = document.createElement('tbody');

      exOrder.forEach((ex, exIdx) => {
        const isMain = exIdx === 0;
        const exSets = daySet.filter(s => s.exercise === ex).sort((a, b) => a.set_number - b.set_number);
        const maxWt = Math.max(...exSets.map(s => parseFloat(s.weight) || 0));
        const weight = maxWt > 0 ? maxWt : null;
        const pctRatio = records[ex] != null && weight != null ? weight / records[ex] : null;
        const pct = pctRatio != null ? Math.round(pctRatio * 100) + '%' : '—';
        const pctColor = pctRatio != null ? (pctRatio >= 0.8 ? 'var(--red)' : pctRatio >= 0.6 ? 'var(--yellow)' : 'var(--green)') : 'var(--txt3)';

        const tr = document.createElement('tr');
        tr.dataset.ex = ex;

        const tdNum = document.createElement('td');
        tdNum.style.cssText = 'font-size:11px;font-weight:700;color:var(--txt3);text-align:center;padding-right:4px;width:20px;font-family:Barlow,sans-serif';
        tdNum.textContent = exIdx + 1;
        tr.appendChild(tdNum);

        const tdName = document.createElement('td');
        tdName.className = 'td-name' + (isMain ? ' is-main' : '');
        tdName.textContent = ex;
        tdName.style.cursor = 'default';
        tr.appendChild(tdName);

        const tdPct = document.createElement('td');
        tdPct.className = 'td-pct'; tdPct.style.color = pctColor; tdPct.textContent = pct;
        tr.appendChild(tdPct);

        const tdWt = document.createElement('td');
        tdWt.className = 'td-weight';
        tdWt.textContent = weight != null ? weight + ' кг' : '—';
        tdWt.style.cursor = 'pointer';
        tr.appendChild(tdWt);

        for (let i = 0; i < maxSets; i++) {
          const td = document.createElement('td'); td.className = 'td-set';
          const s = exSets[i] || null;

          if (!s) {
            const cell = document.createElement('div');
            cell.className = 'set-cell empty'; cell.textContent = '+'; cell.title = 'Добавить подход';
            cell.dataset.ex = ex;
            td.appendChild(cell);
          } else {
            const cellWrap = document.createElement('div');
            cellWrap.className = 'set-cell-wrap';
            cellWrap.title = 'ПКМ — удалить подход';
            cellWrap.dataset.setId = s.id;
            cellWrap.dataset.ex = ex;

            const planEl = document.createElement('span');
            planEl.className = 'set-plan'; planEl.textContent = s.plan != null ? s.plan : '—';
            planEl.style.cursor = 'pointer';
            planEl.dataset.setId = s.id;

            const sep = document.createElement('span'); sep.className = 'set-sep'; sep.textContent = '→';

            const factEl = document.createElement('input');
            const initDone = s.fact != null && s.plan != null && s.fact >= s.plan;
            const initFail = s.fact != null && s.plan != null && s.fact < s.plan;
            factEl.className = 'set-fact' + (initDone ? ' fact-done' : initFail ? ' fact-fail' : '');
            factEl.type = 'number'; factEl.min = '0'; factEl.max = 999;
            factEl.value = s.fact != null ? s.fact : ''; factEl.placeholder = '—';
            factEl.dataset.setId = s.id;

            cellWrap.appendChild(planEl); cellWrap.appendChild(sep); cellWrap.appendChild(factEl);
            td.appendChild(cellWrap);
          }
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      wrap.appendChild(table);
      renderHdrStats();
    }

    document.getElementById('workoutTableWrap').addEventListener('click', e => {
      const addBtn = e.target.closest('.set-cell.empty');
      if (addBtn) {
        const ex = addBtn.dataset.ex;
        const exSets = (setsByDate[curDate] || []).filter(s => s.exercise === ex).sort((a,b)=>a.set_number-b.set_number);
        const lastSet = exSets[exSets.length - 1];
        if (!setsByDate[curDate]) setsByDate[curDate] = [];
        setsByDate[curDate].push({ id: nextId++, date: curDate, exercise: ex, set_number: exSets.length + 1, plan: lastSet ? lastSet.plan : null, fact: null, weight: lastSet ? lastSet.weight : null });
        persist(); loadDayData(); updateDayInCalendar(curDate);
        return;
      }

      const tdWt = e.target.closest('.td-weight');
      if (tdWt && !tdWt.querySelector('input')) {
        const tr = tdWt.closest('tr');
        const ex = tr.dataset.ex;
        const exSets = (setsByDate[curDate] || []).filter(s => s.exercise === ex);
        const weights = exSets.map(s => parseFloat(s.weight)).filter(w => !isNaN(w) && w > 0);
        const maxWt = weights.length ? Math.max(...weights) : null;

        const inp = document.createElement('input');
        inp.className = 'td-weight-input'; inp.type = 'number'; inp.min = 0; inp.max = 9999; inp.step = 0.5;
        // avoid caching old values if they changed
        inp.value = maxWt != null ? maxWt : ''; inp.placeholder = 'кг';
        tdWt.textContent = ''; tdWt.appendChild(inp);
        inp.focus(); inp.select();

        let saved = false;
        function saveWt() {
          if (saved) return; saved = true;
          const v = parseFloat(inp.value);
          const newWt = isNaN(v) ? null : v;
          (setsByDate[curDate] || []).filter(s => s.exercise === ex).forEach(s => s.weight = newWt);
          // Inline replacement without full table reload!
          tdWt.textContent = newWt != null ? newWt + ' кг' : '—';
          // Also update PCT column dynamically
          const pctRatio = records[ex] != null && newWt != null ? newWt / records[ex] : null;
          const pct = pctRatio != null ? Math.round(pctRatio * 100) + '%' : '—';
          const pctColor = pctRatio != null ? (pctRatio >= 0.8 ? 'var(--red)' : pctRatio >= 0.6 ? 'var(--yellow)' : 'var(--green)') : 'var(--txt3)';
          const tdPct = tr.querySelector('.td-pct');
          if (tdPct) { tdPct.style.color = pctColor; tdPct.textContent = pct; }
          
          persist(); updateDayInCalendar(curDate);
        }
        inp.addEventListener('blur', saveWt);
        inp.addEventListener('keydown', ev => {
          if (ev.key === 'Enter') { inp.blur(); }
          if (ev.key === 'Escape') { 
            saved = true; // prevent blur from saving
            tdWt.textContent = maxWt != null ? maxWt + ' кг' : '—'; 
          }
          ev.stopPropagation();
        });
        inp.addEventListener('click', ev => ev.stopPropagation());
        return;
      }

      const planEl = e.target.closest('.set-plan');
      if (planEl && !planEl.querySelector('input')) {
        const setId = parseInt(planEl.dataset.setId);
        const s = (setsByDate[curDate] || []).find(x => x.id === setId);
        if (!s) return;

        const inp = document.createElement('input');
        inp.type = 'number'; inp.min = 0; inp.max = 999;
        inp.style.cssText = 'width:28px;border:none;background:transparent;font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;color:var(--accent);outline:none;text-align:center;padding:0;border-bottom:1px solid var(--accent)';
        const oldVal = s.plan != null ? s.plan : '';
        inp.value = oldVal; inp.placeholder = '—';
        planEl.textContent = ''; planEl.appendChild(inp);
        inp.focus(); inp.select();

        let saved = false;
        function savePlan() {
          if (saved) return; saved = true;
          const v = inp.value.trim();
          s.plan = v !== '' ? parseInt(v) : null;
          planEl.textContent = s.plan != null ? s.plan : '—';
          updateFactColors(s, planEl.nextElementSibling?.nextElementSibling); // sibling input
          persist(); updateDayInCalendar(curDate);
        }
        inp.addEventListener('blur', savePlan);
        inp.addEventListener('keydown', ev => { 
          if (ev.key === 'Enter') inp.blur(); 
          if (ev.key === 'Escape') { 
            saved = true; 
            planEl.textContent = oldVal !== '' ? oldVal : '—'; 
          } 
          ev.stopPropagation(); 
        });
        inp.addEventListener('click', ev => ev.stopPropagation());
        return;
      }
    });

    document.getElementById('workoutTableWrap').addEventListener('contextmenu', e => {
      const cellWrap = e.target.closest('.set-cell-wrap');
      if (cellWrap) {
        e.preventDefault();

    document.getElementById('workoutTableWrap').addEventListener('input', e => {
      if (e.target.classList.contains('set-fact')) {
        const inp = e.target;

    document.getElementById('workoutTableWrap').addEventListener('keydown', e => {

        e.target.blur();
      }
    });
    
    function updateFactColors(s, inp) {
      if (!inp) return;
      const hasFact = s.fact != null;
      const done = hasFact && s.plan != null && s.fact >= s.plan;

    document.getElementById('addSetBtn').addEventListener('click', () => {
      const ex = document.getElementById('exSelect').value;

      const wt = parseFloat(document.getElementById('inWt').value);
      const weight = isNaN(wt) ? null : wt;

    ['inPlan', 'inWt', 'inORM'].forEach(id => {

    document.getElementById('exSelect').addEventListener('mousedown', e => {
      e.preventDefault();

      const isOpen = d.classList.contains('open');

      if (!isOpen) {
        const rect = e.currentTarget.getBoundingClientRect();

        d.style.left = ''; d.style.top = ''; d.style.bottom = ''; d.style.width = dropW + 'px';
        let left = rect.left;
        if (left + dropW > window.innerWidth - 8) left = window.innerWidth - dropW - 8;
        if (left < 8) left = 8;
        d.style.left = left + 'px';
        if (isMobile) {
          d.style.position = 'fixed'; d.style.top = 'auto';
          d.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
          d.style.width = (window.innerWidth - 16) + 'px'; d.style.left = '8px';
        } else {
          d.style.bottom = ''; let top = rect.bottom + 4;
          const dropH = 280;
          if (top + dropH > window.innerHeight - 20) top = rect.top - dropH - 4;
          d.style.top = top + 'px';
        }
        d.classList.add('open');
        renderExListbox();
      }
    });
    document.addEventListener('click', e => {
      const drop = document.getElementById('editorDrop');
      const sel = document.getElementById('exSelect');
      if (drop && !drop.contains(e.target) && e.target !== sel) drop.classList.remove('open');
    });
    document.getElementById('btnAdd').addEventListener('click', () => { edMode = 'add'; document.getElementById('edInputRow').style.display = 'flex'; document.getElementById('edInput').value = ''; document.getElementById('edInput').focus(); });

    document.getElementById('edOk').addEventListener('click', () => {
      const v = document.getElementById('edInput').value.trim(); if (!v) return;
      if (!exercises.includes(v)) { exercises.push(v); persist(); buildExSelect(); renderExListbox(); document.getElementById('exSelect').value = v; syncORM(); }
      document.getElementById('edInputRow').style.display = 'none'; edMode = null;
      document.getElementById('editorDrop').classList.remove('open');
    });
    document.getElementById('edInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('edOk').click(); if (e.key === 'Escape') { document.getElementById('edInputRow').style.display = 'none'; edMode = null; } });

    let ctxTarget = { ex: null, setId: null };
    function showCtxMenu(e, target) {
      ctxTarget = target;
      const menu = document.getElementById('ctxMenu');
      const delSet = document.getElementById('ctxDelSet');
      const sep = document.getElementById('ctxSep');
      const delEx = document.getElementById('ctxDelEx');
      const hasSet = target.setId != null;
      delSet.style.display = hasSet ? 'flex' : 'none';
      sep.style.display = hasSet ? 'block' : 'none';
      delEx.style.display = hasSet ? 'none' : 'flex';
      menu.classList.add('open');
      const x = Math.min(e.clientX, window.innerWidth - 180);
      const y = Math.min(e.clientY, window.innerHeight - 120);
      menu.style.left = x + 'px'; menu.style.top = y + 'px';
    }
    document.getElementById('ctxDelSet').addEventListener('click', () => {
      if (ctxTarget.setId == null) return;
      setsByDate[curDate] = (setsByDate[curDate] || []).filter(s => s.id !== ctxTarget.setId);
      (setsByDate[curDate] || []).filter(s => s.exercise === ctxTarget.ex)
        .sort((a, b) => a.set_number - b.set_number)
        .forEach((s, i) => s.set_number = i + 1);
      persist(); loadDayData(); updateDayInCalendar(curDate);
      document.getElementById('ctxMenu').classList.remove('open');
    });
    document.getElementById('ctxDelEx').addEventListener('click', () => {
      if (!ctxTarget.ex) return;
      setsByDate[curDate] = (setsByDate[curDate] || []).filter(s => s.exercise !== ctxTarget.ex);
      persist(); loadDayData(); updateDayInCalendar(curDate);
      document.getElementById('ctxMenu').classList.remove('open');
    });
    document.addEventListener('click', () => document.getElementById('ctxMenu').classList.remove('open'));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('ctxMenu').classList.remove('open'); });

    document.getElementById('prevBtn').addEventListener('click', () => { anchorMonday.setDate(anchorMonday.getDate() - 7); renderCalendar(); });
    document.getElementById('nextBtn').addEventListener('click', () => { anchorMonday.setDate(anchorMonday.getDate() + 7); renderCalendar(); });

    // ── Свайп вниз для закрытия модалки (мобайл) ──
    (function() {
      const handle   = document.getElementById('modalDragHandle');
      const modalHdr = document.querySelector('.modal-hdr');
      const modal    = document.getElementById('modalBox');
      const mbg      = document.getElementById('mbg');

      let startY = 0, currentY = 0, dragging = false;
      const THRESHOLD = 120;

      function isMobile() { return window.innerWidth <= 600; }

      function onStart(e) {
        if (!isMobile()) return;
        dragging = true;
        startY = e.touches ? e.touches[0].clientY : e.clientY;
        currentY = 0;
        modal.style.transition = 'none';
      }

      function onMove(e) {
        if (!dragging) return;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - startY;
        if (y < 0) return;
        currentY = y;
        modal.style.transform = `translateY(${y}px)`;
        const ratio = Math.max(0, 1 - y / 300);
        mbg.style.background = `rgba(0,0,0,${0.75 * ratio})`;
        if (e.cancelable) e.preventDefault();
      }

      function onEnd() {
        if (!dragging) return;
        dragging = false;
        modal.style.transition = 'transform 0.3s cubic-bezier(0.32,0.72,0,1)';
        if (currentY > THRESHOLD) {
          modal.style.transform = `translateY(100%)`;
          mbg.style.background = 'rgba(0,0,0,0)';
          setTimeout(() => {
            mbg.classList.remove('open');
            modal.style.transform = '';
            mbg.style.background = '';
          }, 300);
        } else {
          modal.style.transform = '';
          mbg.style.background = '';
        }
      }

      [handle, modalHdr].forEach(el => {
        el.addEventListener('touchstart', onStart, { passive: true });
        el.addEventListener('touchmove',  onMove,  { passive: false });
        el.addEventListener('touchend',   onEnd,   { passive: true });
      });
    })();

    // ── Свайп вниз для закрытия выпадающего списка упражнений (мобайл) ──
    (function() {
      const handle = document.getElementById('editorDropHandle');
      const drop   = document.getElementById('editorDrop');
      if (!handle || !drop) return;

      let startY = 0, currentY = 0, dragging = false;
      const THRESHOLD = 80;

      function isMobile() { return window.innerWidth <= 600; }

      handle.addEventListener('touchstart', e => {
        if (!isMobile()) return;
        dragging = true;
        startY = e.touches[0].clientY;
        currentY = 0;
        drop.style.transition = 'none';
      }, { passive: true });

      handle.addEventListener('touchmove', e => {
        if (!dragging) return;
        const y = e.touches[0].clientY - startY;
        if (y < 0) return;
        currentY = y;
        drop.style.transform = `translateY(${y}px)`;
        if (e.cancelable) e.preventDefault();
      }, { passive: false });

      handle.addEventListener('touchend', () => {
        if (!dragging) return;
        dragging = false;
        if (currentY > THRESHOLD) {
          drop.style.transition = 'transform 0.25s cubic-bezier(0.32,0.72,0,1)';
          drop.style.transform = `translateY(120%)`;
          setTimeout(() => {
            drop.classList.remove('open');
            drop.style.transform = '';
            drop.style.transition = '';
          }, 250);
        } else {
          drop.style.transition = 'transform 0.2s cubic-bezier(0.32,0.72,0,1)';
          drop.style.transform = '';
          setTimeout(() => drop.style.transition = '', 200);
        }
      }, { passive: true });
    })();

    renderCalendar();

    // Скролл к текущему дню при загрузке (мобайл)
    (function scrollToToday() {
      if (window.innerWidth > 600) return;
      const dow = now.getDay();            // 0=Вс … 6=Сб
      const colIndex = (dow + 6) % 7;     // Пн=0 … Вс=6
      const colW = window.innerWidth / 2;
      const wrap = document.querySelector('.cal-scroll-wrap');
      if (wrap) wrap.scrollLeft = colIndex * colW;
    })();

    let resizeTimerId;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimerId);
      resizeTimerId = setTimeout(renderCalendar, 300);
    });

  </script>
</body>

</html>
