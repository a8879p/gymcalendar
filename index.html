  </div>

  <!-- Контекстное меню -->
  <div class="ctx-menu" id="ctxMenu">
    <div class="ctx-item" id="ctxDelSet" style="display:none">🗑 Удалить подход</div>
    <div class="ctx-sep" id="ctxSep" style="display:none"></div>
    <div class="ctx-item danger" id="ctxDelEx">✕ Удалить упражнение</div>
  </div>
  <div class="ctx-menu" id="exCtxMenu">
    <div class="ctx-item danger" id="exCtxDel">✕ Удалить</div>
  </div>

  <!-- Контекстное меню ячейки дня -->
  <div class="ctx-menu" id="dayCtxMenu">
    <div class="ctx-item" id="dayCtxCopy">📋 Копировать тренировку</div>
    <div class="ctx-sep" id="dayCtxSep" style="display:none"></div>
    <div class="ctx-item" id="dayCtxPaste" style="display:none">📌 Вставить тренировку</div>
    <div class="ctx-sep" id="dayCtxSep2" style="display:none"></div>
    <div class="ctx-item danger" id="dayCtxCancel" style="display:none">✕ Отменить копирование</div>
  </div>

  <!-- Контекстное меню истории рекордов -->
  <div class="ctx-menu" id="recCtxMenu">
    <div class="ctx-item" id="recCtxEdit">✎ Редактировать вес</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" id="recCtxDel">✕ Удалить запись</div>
  </div>

  <!-- Тултип рекорда -->
  <div id="recTip" class="rec-tip"></div>

  <div id="csLoader" class="cs-loader">
    <div class="cs-ring"></div>
    <div class="cs-text">СИНХРОНИЗАЦИЯ...</div>
  </div>

  <script>
    // ── Telegram ──
    const TM = window.Telegram?.WebApp;
    const isTg = !!TM?.initData;
    if (isTg) {
      TM.ready();
      TM.expand();
      if (typeof TM.requestFullscreen === 'function' && ['tdesktop','macos','web'].includes(TM.platform)) {
        TM.requestFullscreen();
      }
    }

    // ── Константы ──
    const MONTHS       = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const MONTHS_SHORT = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
    const DAYS_RU      = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    const PINNED       = ['Приседания','Жим лёжа','Становая тяга'];
    const REST         = ['Подтягивания','Жим стоя','Тяга штанги','Отжимания','Жим гантелей','Планка','Скручивания'];
    const WEEKS        = 4;
    const isMob        = () => window.innerWidth <= 600;

    const REC_EX = [
      { ex: 'Становая тяга', id: 'rec-stanovaya' },
      { ex: 'Жим лёжа',     id: 'rec-zhim'       },
      { ex: 'Приседания',   id: 'rec-prisedaniya' }
    ];

    // ── Состояние ──
    let exercises        = [...PINNED, ...REST];
    let setsByDate       = {};
    let nextId           = 1;
    let bodyweight       = [];
    let records          = {};
    let pendingCloudSaves = new Set();
    let dirtyDates       = new Set();
    let persistTimer     = null;
    let curDate          = null;
    let copiedDate       = null;

    // ── DOM-кэш ──
    const $ = id => document.getElementById(id);
    const elMbg           = $('mbg');
    const elModalBox      = $('modalBox');
    const elModalTitle    = $('modalTitle');
    const elExSelect      = $('exSelect');
    const elInORM         = $('inORM');
    const elInWt          = $('inWt');
    const elInPlan        = $('inPlan');
    const elTableWrap     = $('workoutTableWrap');
    const elCtxMenu       = $('ctxMenu');
    const elEditorDrop    = $('editorDrop');
    const elExListbox     = $('exListbox');
    const elEdInputRow    = $('edInputRow');
    const elEdInput       = $('edInput');
    const elOverflowPop   = $('overflowPop');
    const elCalGrid       = $('calGrid');
    const elDayCtx        = $('dayCtxMenu');
    const elRecCtxMenu    = $('recCtxMenu');


    // ── Загрузка из localStorage ──
    function initLocalData() {
      setsByDate = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('gd_d_')) {
          try { setsByDate[k.slice(5)] = JSON.parse(localStorage.getItem(k)); } catch(e) {}
        }
      }
      try { const s = localStorage.getItem('gd_meta'); if (s) nextId     = JSON.parse(s).nextId || 1; } catch(e) {}
      try { const s = localStorage.getItem('gd_ex2');  if (s) exercises  = JSON.parse(s); } catch(e) {}
      try { 
        const s = localStorage.getItem('gd_bw');   
        if (s) {
          try {
            const parsed = JSON.parse(s);
            bodyweight = Array.isArray(parsed) ? parsed : [{ value: typeof parsed === 'object' ? parsed.value : parseFloat(parsed), date: null }];
          } catch(e) {
            bodyweight = [{ value: parseFloat(s), date: null }];
          }
        } 
      } catch(e) {}
      try { const s = localStorage.getItem('gd_rec');  if (s) records    = JSON.parse(s); } catch(e) {}
    }

    function runMigrations() {
      let changed = false;
      if (records['Жим лежа']) {
        if (records['Жим лёжа']) {
           records['Жим лёжа'] = [...records['Жим лёжа'], ...records['Жим лежа']].sort((a,b) => (a.date||'').localeCompare(b.date||''));
        } else {
           records['Жим лёжа'] = records['Жим лежа'];
        }
        delete records['Жим лежа'];
        changed = true;
      }
      const idx = exercises.indexOf('Жим лежа');
      if (idx !== -1) {
        exercises.splice(idx, 1);
        if (!exercises.includes('Жим лёжа')) exercises.push('Жим лёжа');
        changed = true;
      }
      Object.keys(setsByDate).forEach(date => {
        let dayChanged = false;
        setsByDate[date].forEach(s => {
          if (s.exercise === 'Жим лежа') { s.exercise = 'Жим лёжа'; dayChanged = true; }
        });
        if (dayChanged) { dirtyDates.add(date); changed = true; }
      });
      if (changed) persist();
    }

    initLocalData();
    runMigrations();


    // ── Хелпер: получить последнее числовое значение рекорда ──
    function recVal(ex) {
      const r = records[ex];
      if (!r) return null;
      if (Array.isArray(r) && r.length) return r[r.length - 1].value;
      if (typeof r === 'object' && !Array.isArray(r)) return r.value;
      if (typeof r === 'number') return r;
      return null;
    }

    function bwVal() {
      if (!bodyweight || !bodyweight.length) return null;
      return bodyweight[bodyweight.length - 1].value;
    }

    // ── Сохранение ──
    function persistImmediately() {
      try {
        localStorage.setItem('gd_meta', JSON.stringify({ nextId }));
        pendingCloudSaves.add('gd_meta');

        localStorage.setItem('gd_ex2', JSON.stringify(exercises));
        pendingCloudSaves.add('gd_ex2');

        if (bodyweight && bodyweight.length > 0) {
          localStorage.setItem('gd_bw', JSON.stringify(bodyweight));
          pendingCloudSaves.add('gd_bw');
        } else {
          localStorage.removeItem('gd_bw');
          pendingCloudSaves.add('DEL:gd_bw');
        }

        localStorage.setItem('gd_rec', JSON.stringify(records));
        pendingCloudSaves.add('gd_rec');

        dirtyDates.forEach(date => {
          if (setsByDate[date]?.length) {
            localStorage.setItem('gd_d_' + date, JSON.stringify(setsByDate[date]));
            pendingCloudSaves.add('gd_d_' + date);
          } else {
            localStorage.removeItem('gd_d_' + date);
            pendingCloudSaves.add('DEL:gd_d_' + date);
          }
        });
        dirtyDates.clear();
        syncDirtyKeysToCloud();
      } catch(e) {}
    }

    function persist() {
      if (curDate) dirtyDates.add(curDate);
      clearTimeout(persistTimer);
      persistTimer = setTimeout(persistImmediately, 500);
    }

    function syncDirtyKeysToCloud() {
      if (!isTg) return;
      const keys = Array.from(pendingCloudSaves);
      pendingCloudSaves.clear();
      keys.forEach(k => {
        if (k.startsWith('DEL:')) {
          const baseKey = k.slice(4);
          TM.CloudStorage.removeItem(baseKey, err => { if (err) pendingCloudSaves.add(k); });
          for(let i=1; i<=10; i++) TM.CloudStorage.removeItem(`${baseKey}_${i}`, ()=>{});
        } else {
          const v = localStorage.getItem(k);
          if (v) {
            if (v.length <= 3500) {
               TM.CloudStorage.setItem(k, v, err => { if (err) pendingCloudSaves.add(k); else { for(let i=1; i<=10; i++) TM.CloudStorage.removeItem(`${k}_${i}`, ()=>{}); } });
            } else {
               const chunks = [];
               for(let i=0; i<v.length; i+=3500) chunks.push(v.slice(i, i+3500));
               TM.CloudStorage.setItem(k, `__CHUNKED__${chunks.length}__` + chunks[0], err => { if(err) pendingCloudSaves.add(k); });
               for(let i=1; i<chunks.length; i++) {
                 TM.CloudStorage.setItem(`${k}_${i}`, chunks[i], ()=>{});
               }
            }
          }
        }
      });
    }

    function syncCloudToLocal() {
      if (!isTg) { $('csLoader').classList.add('hidden'); return; }
      TM.CloudStorage.getKeys((err, keys) => {
        if (err) { TM.showAlert('Ошибка сети при синхронизации. Загружен локальный кэш.'); finishCloudSync(); return; }
        if (!keys?.length) {
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k?.startsWith('gd_')) {
              const v = localStorage.getItem(k);
              if (v.length <= 3500) TM.CloudStorage.setItem(k, v, () => {});
              else pendingCloudSaves.add(k);
            }
          }
          if(pendingCloudSaves.size > 0) syncDirtyKeysToCloud();
          finishCloudSync(); return;
        }
        TM.CloudStorage.getItems(keys, (e, vals) => {
          if (e) { TM.showAlert('Ошибка загрузки данных из облака. Загружен локальный кэш.'); }
          else if (vals) { 
            const reassembled = {};
            Object.keys(vals).forEach(k => {
              if (k.match(/_\d+$/)) return;
              let val = vals[k];
              if (val.startsWith('__CHUNKED__')) {
                const m = val.match(/^__CHUNKED__(\d+)__(.*)/);
                if (m) {
                  const count = parseInt(m[1]);
                  val = m[2];
                  for (let i = 1; i < count; i++) val += (vals[`${k}_${i}`] || '');
                }
              }
              reassembled[k] = val;
            });
            Object.keys(reassembled).forEach(k => localStorage.setItem(k, reassembled[k])); 
            initLocalData(); 
            runMigrations();
          }
          finishCloudSync();
        });
      });
    }

    function finishCloudSync() {
      $('csLoader').classList.add('hidden');
      buildExSelect();
      renderHdrStats();
      renderCalendar();
      if (curDate) loadDayData();
    }

    window.addEventListener('load', syncCloudToLocal);

    // ── Ограничение числовых полей ──
    function limitIntInput(el) {
      if (!el) return;
      el.addEventListener('input', () => {
        let v = el.value.replace(/[^0-9]/g, '');
        if (v.length > 4) v = v.slice(0, 4);
        if (el.value !== v) el.value = v;
      });
    }
    function limitFloatInput(el) {
      if (!el) return;
      el.addEventListener('input', () => {
        let v = el.value.replace(/[^0-9.]/g, '');
        const p = v.split('.');
        if (p[0].length > 4) p[0] = p[0].slice(0, 4);
        v = p.length > 1 ? p[0] + '.' + p[1].slice(0, 1) : p[0];
        if (el.value !== v) el.value = v;
      });
    }
    limitIntInput(elInPlan);
    limitFloatInput(elInWt);
    limitFloatInput(elInORM);

    // ── Шапка — статы ──
    function renderHdrStats() {
      const bw = bwVal();
      const bwEl = $('valBodyweight');
      if (bwEl) bwEl.textContent = bw != null ? `${bw} кг` : '— кг';
      REC_EX.forEach(({ ex, id }) => {
        const el = $(id);
        const v = recVal(ex);
        if (el) el.textContent = v != null ? `${v} кг` : '— кг';
      });
    }
    renderHdrStats();

    // Клик на вес атлета — инлайн-редактирование
    $('chipBodyweight').addEventListener('click', () => {
      const tip = $('recTip');
      if (tip && tip.classList.contains('open')) { tip.classList.remove('open'); return; }
      const valEl = $('valBodyweight');
      if (!valEl) return;
      const inp = document.createElement('input');
      inp.className = 'chip-input'; inp.type = 'number'; inp.inputMode = 'decimal'; inp.min = 0; inp.max = 999; inp.step = 0.1;
      inp.value = bwVal() || ''; inp.placeholder = 'кг';
      valEl.replaceWith(inp); inp.focus(); inp.select();
      let saved = false;

      function closeInput() {
        if (saved) return; saved = true;
        const curBw = bwVal();
        const span = document.createElement('span');
        span.id = 'valBodyweight'; span.className = 'stat-chip-val';
        span.textContent = curBw != null ? `${curBw} кг` : '— кг';
        inp.replaceWith(span);
      }

      function save() {
        if (saved) return;
        const txt = inp.value.replace(',', '.');
        const v = parseFloat(txt);
        if (!isNaN(v) && v > 0) {
           const today = dateToKey(new Date());
           const last = bodyweight.length ? bodyweight[bodyweight.length - 1] : null;
           if (last && last.value === v) {
              last.date = today;
           } else if (last && last.date === today) {
              last.value = v;
           } else {
              bodyweight.push({ value: v, date: today });
           }
           persist();
        }
        closeInput();
        renderHdrStats();
      }
      inp.addEventListener('blur', save);
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') inp.blur();
        if (e.key === 'Escape') { saved = true; closeInput(); }
      });
    });

    $('chipBodyweight').addEventListener('contextmenu', e => {
      e.preventDefault();
      if (!$('recTip').classList.contains('open')) showRecTip('Вес атлета', $('chipBodyweight'), true);
      else $('recTip').classList.remove('open');
    });

    let bwLpTimer = null, bwLpMoved = false;
    $('chipBodyweight').addEventListener('touchstart', e => {
      bwLpMoved = false;
      bwLpTimer = setTimeout(() => {
        if (bwLpMoved) return;
        if (!$('recTip').classList.contains('open')) showRecTip('Вес атлета', $('chipBodyweight'), true);
      }, 500);
    }, { passive: true });
    $('chipBodyweight').addEventListener('touchmove', () => { bwLpMoved = true; clearTimeout(bwLpTimer); }, { passive: true });
    $('chipBodyweight').addEventListener('touchend', () => clearTimeout(bwLpTimer), { passive: true });
    $('chipBodyweight').addEventListener('touchcancel', () => clearTimeout(bwLpTimer), { passive: true });

    // ── Календарь ──
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const todayStr = dateToKey(now);

    function getMondayOf(date) {
      const d = new Date(date);
      const dow = d.getDay();
      d.setDate(d.getDate() + ((dow === 0) ? -6 : 1 - dow));
      return d;
    }

    let anchorMonday = getMondayOf(now);
    anchorMonday.setDate(anchorMonday.getDate() - 7);

    function dkey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
    function dateToKey(d)   { return dkey(d.getFullYear(), d.getMonth(), d.getDate()); }

    // ── Общая функция построения списка упражнений для дня ──
    function buildExListForDate(dateKey) {
      const daySets = setsByDate[dateKey];
      if (!daySets?.length) return [];
      const exMap = {};
      daySets.forEach(s => { if (!exMap[s.exercise]) exMap[s.exercise] = []; exMap[s.exercise].push(s); });
      return Object.keys(exMap).map(ex => {
        const exSets = exMap[ex];
        const maxWt  = Math.max(...exSets.map(s => parseFloat(s.weight) || 0));
        const sorted = [...exSets].sort((a,b) => a.set_number - b.set_number);
        const setsHTML = sorted.map(s => {
          let v = s.fact != null ? String(s.fact) : s.plan != null ? String(s.plan) : '—';
          let style = '';
          if (s.fact != null && s.plan != null) {
            style = `color:${s.fact >= s.plan ? 'var(--green)' : 'var(--red)'}`;
          }
          return `<span class="chip-set-val" style="${style}">${v}</span>`;
        }).join('');
        const pctRatio = recVal(ex) != null && maxWt > 0 ? maxWt / recVal(ex) : null;
        const wtColor  = pctRatio != null ? (pctRatio >= 0.8 ? 'var(--red)' : pctRatio >= 0.6 ? 'var(--yellow)' : 'var(--green)') : 'var(--txt)';
        const weightHTML = maxWt > 0
          ? `<span style="color:${wtColor}">${maxWt}</span><span style="font-size:13px;color:var(--txt2);margin:0 0 0 1px;font-family:'Barlow Condensed',sans-serif;font-weight:500">×</span>`
          : '';
        return { label: ex, weight: weightHTML, sets: setsHTML };
      });
    }

    function getWorkoutsForRange(startDate, endDate) {
      const byDate = {};
      for (let m = new Date(startDate); m <= endDate; m.setDate(m.getDate() + 1)) {
        const k = dateToKey(m);
        const list = buildExListForDate(k);
        if (list.length) byDate[k] = list;
      }
      return byDate;
    }

    function buildChipEl(item, idx, onClick) {
      const chip = document.createElement('div');
      chip.className = 'day-chip' + (idx === 0 ? ' main' : '');
      chip.innerHTML = `<span class="chip-label">${item.label}</span><div class="chip-metrics">${item.weight ? `<span class="chip-weight">${item.weight}</span>` : ''}<span class="chip-sets">${item.sets}</span></div>`;
      chip.addEventListener('click', onClick);
      return chip;
    }

    function getMaxChips() {
      
      let cellH = isMob() ? 136 : 130;
      if (!isMob()) {
        const h = document.body.clientHeight - 100;
        if (h > 0) cellH = h / 4;
      }
      const max = Math.floor((cellH - (isMob() ? 16 : 14)) / 21);
      return max < 4 ? 4 : max;
    }

    function renderDayChips(el, k, exList) {
      const dnum = el.querySelector('.dnum');
      el.innerHTML = '';
      if (dnum) el.appendChild(dnum);

      const MAX   = getMaxChips();
      const total = exList.length;
      const showCount = total > MAX ? MAX - 1 : total;

      exList.slice(0, showCount).forEach((item, idx) => {
        const chip = buildChipEl(item, idx, e => { e.stopPropagation(); openDay(k, item.label); });
        el.appendChild(chip);
      });

      if (total > MAX) {
        const more = document.createElement('span');
        more.className = 'day-chip more';
        more.textContent = `+${total - showCount} ещё`;
        more.addEventListener('click', e => {
          e.stopPropagation();
          const parts = k.split('-');
          const dObj  = new Date(parts[0], parts[1]-1, parts[2]);
          showOverflowPop(k, parseInt(parts[2], 10), dObj.getDay(), exList, more);
        });
        el.appendChild(more);
      }
    }

    function updateDayInCalendar(dateKey) {
      const el = $('day-' + dateKey);
      if (!el) return;
      renderDayChips(el, dateKey, buildExListForDate(dateKey));
    }

    function renderCalendar() {
      const startDate = new Date(anchorMonday);
      const endDate   = new Date(anchorMonday);
      endDate.setDate(startDate.getDate() + WEEKS * 7 - 1);

      const sm = startDate.getMonth(), em = endDate.getMonth();
      const sy = startDate.getFullYear(), ey = endDate.getFullYear();
      let title;
      if (sy === ey && sm === em) title = `${MONTHS[sm]} ${sy}`;
      else if (sy === ey)         title = `${MONTHS[sm]} — ${MONTHS[em]} ${sy}`;
      else                        title = `${MONTHS[sm]} ${sy} — ${MONTHS[em]} ${ey}`;
      $('monthTitle').textContent = title;

      elCalGrid.innerHTML = '';
      const workouts = getWorkoutsForRange(startDate, endDate);

      for (let i = 0; i < WEEKS * 7; i++) {
        const cur = new Date(startDate);
        cur.setDate(startDate.getDate() + i);
        const k   = dateToKey(cur);
        const d   = cur.getDate();
        const m   = cur.getMonth();
        const dow = cur.getDay();

        const el = document.createElement('div');
        el.className = ['day', k === todayStr ? 'today' : '', (dow === 0 || dow === 6) ? 'weekend' : '', m % 2 === 0 ? 'month-a' : 'month-b'].filter(Boolean).join(' ');
        el.id = 'day-' + k;

        const dnum = document.createElement('span');
        dnum.className = 'dnum';
        if (d === 1) {
          dnum.innerHTML = `<span style="font-size:10px;color:var(--accent2);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;display:inline-block;margin-right:4px">${MONTHS_SHORT[m]}</span>${d}`;
        } else {
          dnum.textContent = d;
        }
        el.appendChild(dnum);

        renderDayChips(el, k, workouts[k] || []);
        el.addEventListener('click', e => {
          // Если открыто контекстное меню дня — закрываем его, модалку не открываем
          if (elDayCtx.classList.contains('open')) {
            elDayCtx.classList.remove('open');
            e.stopPropagation();
            return;
          }
          // Если активен режим копирования — отменяем его, модалку не открываем
          if (copiedDate) {
            cancelCopy();
            e.stopPropagation();
            return;
          }
          openDay(k);
        });
        elCalGrid.appendChild(el);
      }

      // восстановить подсветку после перерисовки календаря
      if (copiedDate) {
        const copied = $('day-' + copiedDate);
        if (copied) copied.classList.add('copied');
        document.querySelectorAll('.day').forEach(d => {
          if (d.id !== 'day-' + copiedDate) d.classList.add('paste-hint');
        });
      }
    }

    // ── Overflow-попап ──
    function showOverflowPop(dateKey, d, dow, exList, anchor) {
      $('ovDow').textContent = DAYS_RU[dow];
      $('ovDay').textContent = d;
      const list = $('ovList');
      list.innerHTML = '';
      exList.forEach((item, idx) => {
        const chip = buildChipEl(item, idx, () => { closeOverflowPop(); openDay(dateKey, item.label); });
        list.appendChild(chip);
      });
      const rect = anchor.getBoundingClientRect();
      elOverflowPop.classList.add('open');
      const pw = elOverflowPop.offsetWidth || 220;
      const ph = elOverflowPop.offsetHeight || 200;
      let left = rect.left, top = rect.bottom + 4;
      if (left + pw > window.innerWidth  - 12) left = window.innerWidth  - pw - 12;
      if (top  + ph > window.innerHeight - 12) top  = rect.top - ph - 4;
      elOverflowPop.style.left = left + 'px';
      elOverflowPop.style.top  = top  + 'px';
    }

    function closeOverflowPop() { elOverflowPop.classList.remove('open'); }
    $('ovClose').addEventListener('click', closeOverflowPop);

    // ── Модалка дня ──
    function openDay(dateStr, preselect) {
      curDate = dateStr;
      const [y, mo, d] = dateStr.split('-');
      elModalTitle.textContent = `Тренировка: ${d} ${MONTHS[parseInt(mo)-1]} ${y}`;
      elInPlan.value = '';
      elInWt.value   = '';
      buildExSelect(preselect);
      syncORM();
      loadDayData();
      elMbg.classList.add('open');
    }

    function closeDayModal() {
      if (!elMbg.classList.contains('open')) return;
      elMbg.classList.remove('open');
    }

    $('modalClose').addEventListener('click', closeDayModal);
    elMbg.addEventListener('click', e => { if (e.target === elMbg) closeDayModal(); });

    // ── Select упражнений ──
    function sortedExercises() {
      const p = exercises.filter(e => PINNED.includes(e)).sort((a,b) => PINNED.indexOf(a) - PINNED.indexOf(b));
      const r = exercises.filter(e => !PINNED.includes(e)).sort();
      return [...p, ...r];
    }

    function buildExSelect(preselect) {
      const cur = preselect || elExSelect.value;
      elExSelect.innerHTML = '';
      sortedExercises().forEach(ex => {
        const o = document.createElement('option');
        o.value = ex; o.textContent = ex;
        elExSelect.appendChild(o);
      });
      if (cur && exercises.includes(cur)) elExSelect.value = cur;
      syncORM();
    }

    function syncORM() {
      const ex = elExSelect.value;
      const v = recVal(ex);
      elInORM.value = v != null ? v : '';
    }

    elExSelect.addEventListener('change', syncORM);

    let ormTimer = null;
    elInORM.addEventListener('input', () => {
      clearTimeout(ormTimer);
      ormTimer = setTimeout(() => {
        const ex = elExSelect.value;
        const v  = parseFloat(elInORM.value.replace(',', '.'));
        if (!isNaN(v) && v > 0) {
          if (!Array.isArray(records[ex])) records[ex] = [];
          const r = records[ex];
          if (r.length > 0) {
            let last = r[r.length - 1];
            if (last.date === null) {
              last.value = v;
              if (r.length > 1 && r[r.length - 2].value === v) r.pop();
            } else if (last.value !== v) {
              r.push({ value: v, date: null });
            }
          } else {
            r.push({ value: v, date: null });
          }
        }
        persist(); renderHdrStats();
      }, 500);
    });

    // ── Кнопка «Сохранить в рекорды» ──
    $('saveRecBtn').addEventListener('click', () => {
      const ex  = elExSelect.value;
      if (!ex) return;
      const v = parseFloat(elInORM.value.replace(',', '.'));
      if (isNaN(v) || v <= 0) {
        elInORM.focus();
        elInORM.style.borderColor = 'var(--red)';
        setTimeout(() => elInORM.style.borderColor = '', 1200);
        return;
      }

      const today = dateToKey(new Date());
      let existingValue = null;
      let alreadySavedToday = false;
      const r = records[ex];

      if (Array.isArray(r) && r.length > 0) {
        const last = r[r.length - 1];
        if (last.date === null) {
          existingValue = r.length > 1 ? r[r.length - 2].value : null;
          const formalLast = r.length > 1 ? r[r.length - 2] : null;
          if (formalLast && formalLast.date === today && formalLast.value === v) alreadySavedToday = true;
        } else {
          existingValue = last.value;
          if (last.date === today && last.value === v) alreadySavedToday = true;
        }
      }

      if (alreadySavedToday) {
         elInORM.style.borderColor = 'var(--green)';
         setTimeout(() => elInORM.style.borderColor = '', 1200);
         return;
      }

      function doSave() {
        if (!Array.isArray(records[ex])) records[ex] = [];
        const r2 = records[ex];
        const last2 = r2.length ? r2[r2.length - 1] : null;
        if (last2 && last2.date === null && last2.value === v) {
          last2.date = today;
        } else {
          r2.push({ value: v, date: today });
        }
        persist(); renderHdrStats();
      }

      if (existingValue != null) {
        let tmTitle = 'Перезаписать рекорд?';
        let tmMsg = `${ex}\nБыло: ${existingValue} кг → Станет: ${v} кг`;
        let confirmMsg = `Перезаписать рекорд?\n${ex}\nБыло: ${existingValue} кг → Станет: ${v} кг`;
        
        if (existingValue === v) {
          tmTitle = 'Обновить дату?';
          tmMsg = `${ex}\nПодтвердить прежний рекорд ${v} кг сегодняшним днем?`;
          confirmMsg = `${tmTitle}\n${tmMsg}`;
        }

        if (isTg) {
          TM.showPopup({
            title: tmTitle,
            message: tmMsg,
            buttons: [
              { id: 'ok',     type: 'default', text: 'Сохранить' },
              { id: 'cancel', type: 'cancel' }
            ]
          }, id => { if (id === 'ok') doSave(); });
        } else {
          if (confirm(confirmMsg)) doSave();
        }
      } else {
        doSave();
      }
    });

    // ── Тултип рекорда при клике на чип в шапке ──
    const elRecTip = $('recTip');
    let lastRecAnchor = null;
    let recTipIsBw = false;
    function showRecTip(ex, anchor, isBw = false) {
      lastRecAnchor = anchor;
      recTipIsBw = isBw;
      const r = isBw ? bodyweight : records[ex];
      if (!r) return;
      const entries = Array.isArray(r) ? r : [{ value: typeof r === 'object' ? r.value : r, date: typeof r === 'object' ? r.date : null }];
      if (!entries.length) return;

      let html = `<div class="rec-tip-label">${ex} — история</div>`;
      // показываем от новых к старым
      [...entries].reverse().forEach((entry, idx) => {
        const realIdx = entries.length - 1 - idx;
        const isLatest = idx === 0;
        let dateStr = '—';
        if (entry.date) {
          const [y, mo, d] = entry.date.split('-');
          dateStr = `${d} ${MONTHS[parseInt(mo)-1]} ${y}`;
        }
        html += `<div class="rec-tip-row${isLatest ? ' latest' : ''}" data-ex="${ex}" data-idx="${realIdx}">
          <span class="rec-tip-row-val">${entry.value} кг</span>
          <span class="rec-tip-row-date">${dateStr}</span>
        </div>`;
      });
      elRecTip.innerHTML = html;

      elRecTip.classList.add('open');
      const rect = anchor.getBoundingClientRect();
      let left = rect.left;
      let top  = rect.bottom + 6;
      const tw = elRecTip.offsetWidth || 200;
      const th = elRecTip.offsetHeight || 120;
      if (left + tw > window.innerWidth  - 8) left = window.innerWidth  - tw - 8;
      if (top  + th > window.innerHeight - 8) top  = rect.top - th - 6;
      elRecTip.style.left = left + 'px';
      elRecTip.style.top  = top  + 'px';
    }

    REC_EX.forEach(({ ex, id }) => {
      const chip = $(id)?.closest('.stat-chip');
      if (!chip) return;
      chip.addEventListener('click', e => {
        e.stopPropagation();
        if (elRecTip.classList.contains('open')) { elRecTip.classList.remove('open'); return; }
        showRecTip(ex, chip);
      });
    });

    // ── Контекстное меню истории рекордов ──
    let recCtxTarget = { ex: null, idx: null, isBw: false };

    elRecTip.addEventListener('contextmenu', e => {
      const row = e.target.closest('.rec-tip-row');
      if (!row) return;
      e.preventDefault();
      recCtxTarget = { ex: row.dataset.ex, idx: parseInt(row.dataset.idx), isBw: recTipIsBw };
      const x = Math.min(e.clientX, window.innerWidth  - 180);
      const y = Math.min(e.clientY, window.innerHeight - 100);
      elRecCtxMenu.style.left = x + 'px';
      elRecCtxMenu.style.top  = y + 'px';
      elRecCtxMenu.classList.add('open');
    });

    let recLpTimer = null, recLpMoved = false;
    elRecTip.addEventListener('touchstart', e => {
      const row = e.target.closest('.rec-tip-row');
      if (!row) return;
      recLpMoved = false;
      recLpTimer = setTimeout(() => {
        if (recLpMoved) return;
        recCtxTarget = { ex: row.dataset.ex, idx: parseInt(row.dataset.idx), isBw: recTipIsBw };
        const touch = e.touches[0];
        const x = Math.min(touch.clientX, window.innerWidth  - 180);
        const y = Math.min(touch.clientY, window.innerHeight - 100);
        elRecCtxMenu.style.left = x + 'px';
        elRecCtxMenu.style.top  = y + 'px';
        elRecCtxMenu.classList.add('open');
      }, 500);
    }, { passive: true });
    elRecTip.addEventListener('touchmove', () => { recLpMoved = true; clearTimeout(recLpTimer); }, { passive: true });
    elRecTip.addEventListener('touchend', () => clearTimeout(recLpTimer), { passive: true });
    elRecTip.addEventListener('touchcancel', () => clearTimeout(recLpTimer), { passive: true });

    $('recCtxEdit').addEventListener('click', () => {
      if (!recCtxTarget.ex || recCtxTarget.idx == null) return;
      const r = recCtxTarget.isBw ? bodyweight : records[recCtxTarget.ex];
      if (Array.isArray(r) && r[recCtxTarget.idx]) {
        const resp = prompt('Новый вес (кг):', r[recCtxTarget.idx].value);
        if (resp !== null && resp.trim() !== '') {
          const newVal = parseFloat(resp.replace(',', '.'));
          if (!isNaN(newVal) && newVal > 0) {
            r[recCtxTarget.idx].value = newVal;
            persist(); renderHdrStats();
            if (elRecTip.classList.contains('open')) showRecTip(recCtxTarget.ex, lastRecAnchor, recCtxTarget.isBw);
          }
        }
      }
      elRecCtxMenu.classList.remove('open');
    });

    $('recCtxDel').addEventListener('click', () => {
      if (!recCtxTarget.ex || recCtxTarget.idx == null) return;
      const r = recCtxTarget.isBw ? bodyweight : records[recCtxTarget.ex];
      if (Array.isArray(r) && r[recCtxTarget.idx]) {
        if (confirm('Удалить эту запись?')) {
          r.splice(recCtxTarget.idx, 1);
          if (r.length === 0 && !recCtxTarget.isBw) delete records[recCtxTarget.ex];
          persist(); renderHdrStats();
          if (elRecTip.classList.contains('open') && r.length > 0) {
            showRecTip(recCtxTarget.ex, lastRecAnchor, recCtxTarget.isBw);
          } else {
            elRecTip.classList.remove('open');
            if (!recCtxTarget.isBw) syncORM();
          }
        }
      }
      elRecCtxMenu.classList.remove('open');
    });

    // ── Листбокс упражнений в дропдауне ──
    let selEx = null;
    function renderExListbox() {
      elExListbox.innerHTML = ''; selEx = null;
      sortedExercises().forEach(ex => {
        const div = document.createElement('div');
        div.className = 'ex-listbox-item';
        div.textContent = ex;
        if (ex === elExSelect.value) div.classList.add('sel');
        div.addEventListener('click', () => {
          selEx = ex;
          elExSelect.value = ex;
          syncORM();
          elExListbox.querySelectorAll('.ex-listbox-item').forEach(d => d.classList.remove('sel'));
          div.classList.add('sel');
          elEditorDrop.classList.remove('open');
        });
        div.addEventListener('contextmenu', e => {
          e.stopPropagation();
          selEx = ex;
          elExListbox.querySelectorAll('.ex-listbox-item').forEach(d => d.classList.remove('sel'));
          div.classList.add('sel');
          showExCtxMenu(e, ex);
        });
        elExListbox.appendChild(div);
      });
    }

    // ── Контекстное меню упражнений в листбоксе ──
    const elExCtxMenu = $('exCtxMenu');
    function showExCtxMenu(e, ex) {
      const x = Math.min(e.clientX, window.innerWidth  - 180);
      const y = Math.min(e.clientY, window.innerHeight - 100);
      elExCtxMenu.style.left = x + 'px';
      elExCtxMenu.style.top  = y + 'px';
      elExCtxMenu.classList.add('open');
    }

    $('exCtxDel').addEventListener('click', () => {
      if (!selEx) return;
      elExCtxMenu.classList.remove('open');
      exercises = exercises.filter(x => x !== selEx);
      persist(); buildExSelect(); renderExListbox();
    });

    // Открытие/закрытие дропдауна упражнений
    elExSelect.addEventListener('mousedown', e => {
      e.preventDefault();
      const isOpen = elEditorDrop.classList.contains('open');
      elEditorDrop.classList.remove('open');
      if (!isOpen) {
        const rect   = e.currentTarget.getBoundingClientRect();
        
        const dropW  = Math.max(300, rect.width);
        elEditorDrop.style.width = dropW + 'px';
        let left = rect.left;
        if (left + dropW > window.innerWidth - 8) left = window.innerWidth - dropW - 8;
        if (left < 8) left = 8;
        elEditorDrop.style.left = left + 'px';
        if (isMob()) {
          elEditorDrop.style.top    = 'auto';
          elEditorDrop.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
          elEditorDrop.style.width  = (window.innerWidth - 16) + 'px';
          elEditorDrop.style.left   = '8px';
        } else {
          elEditorDrop.style.bottom = '';
          let top = rect.bottom + 4;
          if (top + 280 > window.innerHeight - 20) top = rect.top - 280 - 4;
          elEditorDrop.style.top = top + 'px';
        }
        elEditorDrop.classList.add('open');
        renderExListbox();
      }
    });

    $('btnAdd').addEventListener('click', () => {
      elEdInputRow.style.display = 'flex';
      elEdInput.value = '';
      elEdInput.focus();
    });

    $('edOk').addEventListener('click', () => {
      const v = elEdInput.value.trim();
      if (!v) return;
      if (!exercises.includes(v)) {
        exercises.push(v);
        persist(); buildExSelect(); renderExListbox();
        elExSelect.value = v; syncORM();
      }
      elEdInputRow.style.display = 'none';
      elEditorDrop.classList.remove('open');
    });

    elEdInput.addEventListener('keydown', e => {
      if (e.key === 'Enter')  $('edOk').click();
      if (e.key === 'Escape') { elEdInputRow.style.display = 'none'; }
    });

    // ── Добавить подход ──
    $('addSetBtn').addEventListener('click', () => {
      const ex     = elExSelect.value;
      const plan   = parseInt(elInPlan.value) || null;
      const wt     = parseFloat(elInWt.value);
      const weight = isNaN(wt) ? null : wt;

      if (!ex) return;
      if (weight === null && plan === null) return;
      if (weight === 0 && plan === null) {
        elInPlan.focus(); elInPlan.style.borderColor = 'var(--red)';
        setTimeout(() => elInPlan.style.borderColor = '', 1200);
        return;
      }

      if (!setsByDate[curDate]) setsByDate[curDate] = [];
      const exSets = setsByDate[curDate].filter(s => s.exercise === ex);
      const setNum = exSets.length ? Math.max(...exSets.map(s => s.set_number)) + 1 : 1;
      setsByDate[curDate].push({ id: nextId++, date: curDate, exercise: ex, set_number: setNum, plan, fact: null, weight });

      elInPlan.value = ''; elInWt.value = '';
      persist(); loadDayData(); updateDayInCalendar(curDate);
    });

    ['inPlan','inWt'].forEach(id => {
      $(id).addEventListener('keydown', e => { if (e.key === 'Enter') $('addSetBtn').click(); });
    });

    // ── Загрузка данных дня в таблицу ──
    function loadDayData() {
      const daySet = setsByDate[curDate] || [];
      const exOrder = []; const seen = new Set();
      [...daySet].sort((a,b) => a.id - b.id).forEach(s => {
        if (!seen.has(s.exercise)) { seen.add(s.exercise); exOrder.push(s.exercise); }
      });
      elTableWrap.innerHTML = '';

      if (!daySet.length) {
        elTableWrap.innerHTML = '<div class="ex-cards-empty">Нет подходов — добавь первый</div>';
        renderHdrStats(); return;
      }

      const countMap = {};
      daySet.forEach(s => { countMap[s.exercise] = (countMap[s.exercise] || 0) + 1; });
      const maxSets = daySet.length ? Math.max(...Object.values(countMap)) : 0;

      const table = document.createElement('table');
      table.className = 'workout-table';

      const thead = document.createElement('thead');
      let thHTML = '<tr><th class="th-num" style="width:20px">#</th><th class="th-name">Упражнение</th><th class="th-num">%1ПМ</th><th class="th-num">Вес кг</th>';
      for (let i = 1; i <= maxSets; i++) thHTML += `<th class="th-num">${i} пдх</th>`;
      thHTML += '</tr>';
      thead.innerHTML = thHTML;
      table.appendChild(thead);

      const tbody = document.createElement('tbody');

      exOrder.forEach((ex, exIdx) => {
        const isMain  = exIdx === 0;
        const exSets  = daySet.filter(s => s.exercise === ex).sort((a,b) => a.set_number - b.set_number);
        const maxWt   = Math.max(...exSets.map(s => parseFloat(s.weight) || 0));
        const weight  = maxWt > 0 ? maxWt : null;
        const pctRatio = recVal(ex) != null && weight != null ? weight / recVal(ex) : null;
        const pct      = pctRatio != null ? Math.round(pctRatio * 100) + '%' : '—';
        const pctColor = pctRatio != null ? (pctRatio >= 0.8 ? 'var(--red)' : pctRatio >= 0.6 ? 'var(--yellow)' : 'var(--green)') : 'var(--txt3)';

        const tr = document.createElement('tr');
        tr.dataset.ex = ex;

        // # номер
        const tdNum = document.createElement('td');
        tdNum.className = 'td-num';
        tdNum.textContent = exIdx + 1;
        tr.appendChild(tdNum);

        // Название
        const tdName = document.createElement('td');
        tdName.className = 'td-name' + (isMain ? ' is-main' : '');
        tdName.textContent = ex;
        tr.appendChild(tdName);

        // %1ПМ
        const tdPct = document.createElement('td');
        tdPct.className = 'td-pct';
        tdPct.style.color = pctColor;
        tdPct.textContent = pct;
        tr.appendChild(tdPct);

        // Вес
        const tdWt = document.createElement('td');
        tdWt.className = 'td-weight';
        tdWt.textContent = weight != null ? weight + ' кг' : '—';
        tr.appendChild(tdWt);

        // Подходы
        for (let i = 0; i < maxSets; i++) {
          const td = document.createElement('td');
          td.className = 'td-set';
          const s = exSets[i] || null;

          if (!s) {
            const cell = document.createElement('div');
            cell.className = 'set-cell empty';
            cell.textContent = '+';
            cell.title = 'Добавить подход';
            cell.dataset.ex = ex;
            td.appendChild(cell);
          } else {
            const wrap = document.createElement('div');
            wrap.className = 'set-cell-wrap';
            wrap.title = 'ПКМ — удалить подход';
            wrap.dataset.setId = s.id;
            wrap.dataset.ex    = ex;

            const planEl = document.createElement('span');
            planEl.className = 'set-plan';
            planEl.textContent = s.plan != null ? s.plan : '—';
            planEl.dataset.setId = s.id;

            const sep = document.createElement('span');
            sep.className = 'set-sep';
            sep.textContent = '→';

            const factEl = document.createElement('input');
            const done = s.fact != null && s.plan != null && s.fact >= s.plan;
            const fail = s.fact != null && s.plan != null && s.fact <  s.plan;
            factEl.className = 'set-fact' + (done ? ' fact-done' : fail ? ' fact-fail' : '');
            factEl.type = 'number'; factEl.inputMode = 'numeric'; factEl.min = '0'; factEl.max = 999;
            factEl.value = s.fact != null ? s.fact : '';
            factEl.placeholder = '—';
            factEl.dataset.setId = s.id;

            wrap.appendChild(planEl); wrap.appendChild(sep); wrap.appendChild(factEl);
            td.appendChild(wrap);
          }
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      elTableWrap.appendChild(table);
      renderHdrStats();
    }

    // ── Клики внутри таблицы ──
    elTableWrap.addEventListener('click', e => {
      // Добавить пустой подход
      const addCell = e.target.closest('.set-cell.empty');
      if (addCell) {
        const ex     = addCell.dataset.ex;
        const exSets = (setsByDate[curDate] || []).filter(s => s.exercise === ex).sort((a,b) => a.set_number - b.set_number);
        const last   = exSets[exSets.length - 1];
        if (!setsByDate[curDate]) setsByDate[curDate] = [];
        setsByDate[curDate].push({ id: nextId++, date: curDate, exercise: ex, set_number: exSets.length + 1, plan: last?.plan ?? null, fact: null, weight: last?.weight ?? null });
        persist(); loadDayData(); updateDayInCalendar(curDate);
        return;
      }

      // Редактировать вес
      const tdWt = e.target.closest('.td-weight');
      if (tdWt && !tdWt.querySelector('input')) {
        const tr    = tdWt.closest('tr');
        const ex    = tr.dataset.ex;
        const exSets = (setsByDate[curDate] || []).filter(s => s.exercise === ex);
        const ws    = exSets.map(s => parseFloat(s.weight)).filter(w => !isNaN(w) && w > 0);
        const maxWt = ws.length ? Math.max(...ws) : null;

        const inp = document.createElement('input');
        inp.className = 'td-weight-input'; inp.type = 'number'; inp.inputMode = 'decimal'; inp.min = 0; inp.max = 9999; inp.step = 0.5;
        inp.value = maxWt != null ? maxWt : ''; inp.placeholder = 'кг';
        tdWt.textContent = ''; tdWt.appendChild(inp);
        inp.focus(); inp.select();

        let saved = false;
        function saveWt() {
          if (saved) return; saved = true;
          const v = parseFloat(inp.value);
          const newWt = isNaN(v) ? null : v;
          (setsByDate[curDate] || []).filter(s => s.exercise === ex).forEach(s => s.weight = newWt);
          tdWt.textContent = newWt != null ? newWt + ' кг' : '—';
          const pctRatio = recVal(ex) != null && newWt != null ? newWt / recVal(ex) : null;
          const tdPct = tr.querySelector('.td-pct');
          if (tdPct) {
            tdPct.style.color = pctRatio != null ? (pctRatio >= 0.8 ? 'var(--red)' : pctRatio >= 0.6 ? 'var(--yellow)' : 'var(--green)') : 'var(--txt3)';
            tdPct.textContent = pctRatio != null ? Math.round(pctRatio * 100) + '%' : '—';
          }
          persist(); updateDayInCalendar(curDate);
        }
        inp.addEventListener('blur', saveWt);
        inp.addEventListener('keydown', ev => {
          if (ev.key === 'Enter')  { inp.blur(); }
          if (ev.key === 'Escape') { saved = true; tdWt.textContent = maxWt != null ? maxWt + ' кг' : '—'; inp.blur(); }
          ev.stopPropagation();
        });
        inp.addEventListener('click', ev => ev.stopPropagation());
        return;
      }

      // Редактировать план
      const planEl = e.target.closest('.set-plan');
      if (planEl && !planEl.querySelector('input')) {
        const setId = parseInt(planEl.dataset.setId);
        const s = (setsByDate[curDate] || []).find(x => x.id === setId);
        if (!s) return;
        const oldVal = s.plan != null ? s.plan : '';
        const inp = document.createElement('input');
        inp.type = 'number'; inp.inputMode = 'numeric'; inp.min = 0; inp.max = 999;
        inp.style.cssText = 'width:28px;border:none;background:transparent;font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:500;color:var(--accent);outline:none;box-shadow:none;-webkit-appearance:none;appearance:none;text-align:center;padding:0;';
        inp.value = oldVal; inp.placeholder = '—';
        planEl.textContent = ''; planEl.appendChild(inp);
        inp.focus(); inp.select();
        let saved = false;
        function savePlan() {
          if (saved) return; saved = true;
          const v = inp.value.trim();
          s.plan = v !== '' ? parseInt(v) : null;
          planEl.textContent = s.plan != null ? s.plan : '—';
          updateFactColors(s, planEl.nextElementSibling?.nextElementSibling);
          persist(); updateDayInCalendar(curDate);
        }
        inp.addEventListener('blur', savePlan);
        inp.addEventListener('keydown', ev => {
          if (ev.key === 'Enter')  inp.blur();
          if (ev.key === 'Escape') { saved = true; planEl.textContent = oldVal !== '' ? oldVal : '—'; inp.blur(); }
          ev.stopPropagation();
        });
        inp.addEventListener('click', ev => ev.stopPropagation());
        return;
      }

      // Клик на название упражнения — выбрать в селекте
      const tdName = e.target.closest('.td-name');
      if (tdName) {
        const ex = tdName.textContent.trim();
        if (exercises.includes(ex)) {
          elExSelect.value = ex;
          syncORM();
          // подсветить строку
          document.querySelectorAll('.workout-table tbody tr').forEach(r => r.style.outline = '');
          tdName.closest('tr').style.outline = '1.5px solid var(--accent)';
          setTimeout(() => { const tr = tdName.closest('tr'); if (tr) tr.style.outline = ''; }, 800);
        }
        return;
      }
    });

    // Ввод факта
    elTableWrap.addEventListener('input', e => {
      if (!e.target.classList.contains('set-fact')) return;
      const inp   = e.target;
      const setId = parseInt(inp.dataset.setId);
      const s     = (setsByDate[curDate] || []).find(x => x.id === setId);
      if (!s) return;
      clearTimeout(inp._factTimer);
      inp._factTimer = setTimeout(() => {
        s.fact = inp.value !== '' ? parseInt(inp.value) : null;
        updateFactColors(s, inp);
        persist(); updateDayInCalendar(curDate);
      }, 400);
    });

    elTableWrap.addEventListener('keydown', e => {
      if (e.target.classList.contains('set-fact') && e.key === 'Enter') e.target.blur();
    });

    function updateFactColors(s, inp) {
      if (!inp) return;
      const done = s.fact != null && s.plan != null && s.fact >= s.plan;
      const fail = s.fact != null && s.plan != null && s.fact <  s.plan;
      inp.className = 'set-fact' + (done ? ' fact-done' : fail ? ' fact-fail' : '');
    }

    // Контекстное меню таблицы (десктоп — ПКМ)
    elTableWrap.addEventListener('contextmenu', e => {
      const wrap = e.target.closest('.set-cell-wrap');
      if (wrap) { showCtxMenu(e, { ex: wrap.dataset.ex, setId: parseInt(wrap.dataset.setId) }); return; }
      const name = e.target.closest('.td-name');
      if (name) { showCtxMenu(e, { ex: name.textContent.trim(), setId: null }); }
    });

    // Long press в таблице (мобайл)
    let twLpTimer = null, twLpMoved = false;
    elTableWrap.addEventListener('touchstart', e => {
      const wrap = e.target.closest('.set-cell-wrap');
      const name = e.target.closest('.td-name');
      if (!wrap && !name) return;
      twLpMoved = false;
      const touch = e.touches[0];
      twLpTimer = setTimeout(() => {
        if (twLpMoved) return;
        const fakeE = { clientX: touch.clientX, clientY: touch.clientY };
        if (wrap) showCtxMenu(fakeE, { ex: wrap.dataset.ex, setId: parseInt(wrap.dataset.setId) });
        else      showCtxMenu(fakeE, { ex: name.textContent.trim(), setId: null });
      }, 500);
    }, { passive: true });

    elTableWrap.addEventListener('touchmove',   () => { twLpMoved = true; clearTimeout(twLpTimer); }, { passive: true });
    elTableWrap.addEventListener('touchend',    () => clearTimeout(twLpTimer), { passive: true });
    elTableWrap.addEventListener('touchcancel', () => clearTimeout(twLpTimer), { passive: true });

    let ctxTarget = { ex: null, setId: null };
    function showCtxMenu(e, target) {
      ctxTarget = target;
      const hasSet = target.setId != null;
      $('ctxDelSet').style.display = hasSet ? 'flex'  : 'none';
      $('ctxSep').style.display    = hasSet ? 'block' : 'none';
      $('ctxDelEx').style.display  = hasSet ? 'none'  : 'flex';
      elCtxMenu.style.left = Math.min(e.clientX, window.innerWidth  - 180) + 'px';
      elCtxMenu.style.top  = Math.min(e.clientY, window.innerHeight - 120) + 'px';
      elCtxMenu.classList.add('open');
    }

    $('ctxDelSet').addEventListener('click', () => {
      if (ctxTarget.setId == null) return;
      setsByDate[curDate] = (setsByDate[curDate] || []).filter(s => s.id !== ctxTarget.setId);
      (setsByDate[curDate] || []).filter(s => s.exercise === ctxTarget.ex)
        .sort((a,b) => a.set_number - b.set_number)
        .forEach((s, i) => s.set_number = i + 1);
      persist(); loadDayData(); updateDayInCalendar(curDate);
      elCtxMenu.classList.remove('open');
    });

    $('ctxDelEx').addEventListener('click', () => {
      if (!ctxTarget.ex) return;
      setsByDate[curDate] = (setsByDate[curDate] || []).filter(s => s.exercise !== ctxTarget.ex);
      persist(); loadDayData(); updateDayInCalendar(curDate);
      elCtxMenu.classList.remove('open');
    });

    // Навигация
    $('prevBtn').addEventListener('click', () => { anchorMonday.setDate(anchorMonday.getDate() - 7); renderCalendar(); });
    $('nextBtn').addEventListener('click', () => { anchorMonday.setDate(anchorMonday.getDate() + 7); renderCalendar(); });

    // ── Копирование / вставка тренировки ──
    const elDCtxCopy = $('dayCtxCopy');
    const elDCtxPaste  = $('dayCtxPaste');
    const elDCtxCancel = $('dayCtxCancel');
    const elDCtxSep    = $('dayCtxSep');
    const elDCtxSep2   = $('dayCtxSep2');

    function setCopiedDate(dateKey) {
      // снять предыдущий highlight
      if (copiedDate) {
        const prev = $('day-' + copiedDate);
        if (prev) prev.classList.remove('copied');
      }
      copiedDate = dateKey;
      if (dateKey) {
        const el = $('day-' + dateKey);
        if (el) el.classList.add('copied');
        // подсветить все ячейки как paste-hint
        document.querySelectorAll('.day').forEach(d => {
          if (d.id !== 'day-' + dateKey) d.classList.add('paste-hint');
        });
      } else {
        document.querySelectorAll('.day.paste-hint').forEach(d => d.classList.remove('paste-hint'));
      }
    }

    function cancelCopy() {
      setCopiedDate(null);
    }

    function pasteWorkout(targetDate) {
      const srcSets = setsByDate[copiedDate];
      if (!srcSets?.length) { cancelCopy(); return; }

      function doInsert(merge) {
        const copies = srcSets.map(s => ({
          ...s,
          id: nextId++,
          date: targetDate
        }));
        if (!merge) {
          setsByDate[targetDate] = copies;
        } else {
          if (!setsByDate[targetDate]) setsByDate[targetDate] = [];
          setsByDate[targetDate].push(...copies);
          // пересчитать set_number по упражнениям
          const exSetsMap = {};
          setsByDate[targetDate].forEach(s => {
            if (!exSetsMap[s.exercise]) exSetsMap[s.exercise] = [];
            exSetsMap[s.exercise].push(s);
          });
          Object.values(exSetsMap).forEach(arr => {
            arr.sort((a,b) => a.id - b.id).forEach((s,i) => s.set_number = i + 1);
          });
        }
        // mark targetDate dirty
        const prevCur = curDate;
        curDate = targetDate;
        persist();
        curDate = prevCur;
        updateDayInCalendar(targetDate);
        cancelCopy();
      }

      const hasTarget = setsByDate[targetDate]?.length > 0;
      if (hasTarget && isTg) {
        TM.showPopup({
          title: 'Вставить тренировку',
          message: 'В этот день уже есть подходы. Что сделать?',
          buttons: [
            { id: 'replace', type: 'default', text: 'Заменить' },
            { id: 'merge',   type: 'default', text: 'Добавить к существующим' },
            { id: 'cancel',  type: 'cancel' }
          ]
        }, (btnId) => {
          if (btnId === 'replace') doInsert(false);
          else if (btnId === 'merge') doInsert(true);
        });
      } else if (hasTarget) {
        const choice = confirm('В этот день уже есть подходы.\nОК = Заменить, Отмена = Добавить к существующим');
        doInsert(choice);
      } else {
        doInsert(false);
      }
    }

    function showDayCtxMenu(e, dateKey) {
      const hasWorkout = !!(setsByDate[dateKey]?.length);
      const hasCopied  = !!copiedDate && copiedDate !== dateKey;

      elDCtxCopy.style.display   = hasWorkout ? 'flex' : 'none';
      elDCtxSep.style.display    = (hasWorkout && hasCopied) ? 'block' : 'none';
      elDCtxPaste.style.display  = hasCopied ? 'flex' : 'none';
      elDCtxSep2.style.display   = copiedDate ? 'block' : 'none';
      elDCtxCancel.style.display = copiedDate ? 'flex' : 'none';

      // если нечего показывать — не открываем
      if (!hasWorkout && !copiedDate) return;

      elDCtxCopy.onclick   = () => { setCopiedDate(dateKey); elDayCtx.classList.remove('open'); };
      elDCtxPaste.onclick  = () => { pasteWorkout(dateKey);  elDayCtx.classList.remove('open'); };
      elDCtxCancel.onclick = () => { cancelCopy();           elDayCtx.classList.remove('open'); };

      const x = Math.min(e.clientX, window.innerWidth  - 210);
      const y = Math.min(e.clientY, window.innerHeight - 200);
      elDayCtx.style.left = x + 'px';
      elDayCtx.style.top  = y + 'px';
      elDayCtx.classList.add('open');
    }

    // ПКМ на сетке календаря (десктоп)
    elCalGrid.addEventListener('contextmenu', e => {
      const dayEl = e.target.closest('.day');
      if (!dayEl) return;
      const dateKey = dayEl.id.replace('day-', '');
      showDayCtxMenu(e, dateKey);
    });

    // Long press на сетке (мобайл)
    let lpTimer = null, lpMoved = false;
    elCalGrid.addEventListener('touchstart', e => {
      const dayEl = e.target.closest('.day');
      if (!dayEl) return;
      lpMoved = false;
      lpTimer = setTimeout(() => {
        if (lpMoved) return;
        const dateKey = dayEl.id.replace('day-', '');
        const touch   = e.touches[0];
        showDayCtxMenu({ clientX: touch.clientX, clientY: touch.clientY }, dateKey);
      }, 500);
    }, { passive: true });

    elCalGrid.addEventListener('touchmove',  () => { lpMoved = true; clearTimeout(lpTimer); }, { passive: true });
    elCalGrid.addEventListener('touchend',   () => clearTimeout(lpTimer), { passive: true });
    elCalGrid.addEventListener('touchcancel',() => clearTimeout(lpTimer), { passive: true });

    // ── Блокировка стандартного браузерного контекстного меню ──
    document.addEventListener('contextmenu', e => e.preventDefault());

    // ── Единый глобальный обработчик кликов для закрытия попапов ──
    document.addEventListener('click', e => {
      elCtxMenu.classList.remove('open');
      elExCtxMenu.classList.remove('open');
      elDayCtx.classList.remove('open');
      elRecCtxMenu.classList.remove('open');
      if (!elEditorDrop.contains(e.target) && e.target !== elExSelect) elEditorDrop.classList.remove('open');
      if (elOverflowPop.classList.contains('open') && !elOverflowPop.contains(e.target)) closeOverflowPop();
      if (elRecTip.classList.contains('open') && !elRecTip.contains(e.target)) elRecTip.classList.remove('open');
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        elCtxMenu.classList.remove('open');
        elExCtxMenu.classList.remove('open');
        elDayCtx.classList.remove('open');
        elRecCtxMenu.classList.remove('open');
        elRecTip.classList.remove('open');
        cancelCopy();
        closeOverflowPop();
      }
    });

    // ── Свайп вниз — закрытие модалки (мобайл) ──
    (function() {
      const handle = $('modalDragHandle');
      const hdr    = document.querySelector('.modal-hdr');
      let startY = 0, currentY = 0, dragging = false;

      

      function onStart(e) {
        if (!isMob()) return;
        dragging = true;
        startY   = e.touches ? e.touches[0].clientY : e.clientY;
        currentY = 0;
        elModalBox.style.transition = 'none';
      }
      function onMove(e) {
        if (!dragging) return;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - startY;
        if (y < 0) return;
        currentY = y;
        elModalBox.style.transform = `translateY(${y}px)`;
        elMbg.style.background = `rgba(0,0,0,${0.75 * Math.max(0, 1 - y/300)})`;
        if (e.cancelable) e.preventDefault();
      }
      function onEnd() {
        if (!dragging) return;
        dragging = false;
        elModalBox.style.transition = 'transform 0.3s cubic-bezier(0.32,0.72,0,1)';
        if (currentY > 120) {
          elModalBox.style.transform = 'translateY(100%)';
          elMbg.style.background = 'rgba(0,0,0,0)';
          setTimeout(() => { elMbg.classList.remove('open'); elModalBox.style.transform = ''; elMbg.style.background = ''; }, 300);
        } else {
          elModalBox.style.transform = '';
          elMbg.style.background = '';
        }
      }

      [handle, hdr].forEach(el => {
        el.addEventListener('touchstart', onStart, { passive: true });
        el.addEventListener('touchmove',  onMove,  { passive: false });
        el.addEventListener('touchend',   onEnd,   { passive: true });
      });
    })();

    // ── Свайп вниз — закрытие дропдауна упражнений (мобайл) ──
    (function() {
      const handle = $('editorDropHandle');
      if (!handle) return;
      let startY = 0, currentY = 0, dragging = false;

      handle.addEventListener('touchstart', e => {
        if (window.innerWidth > 600) return;
        dragging = true; startY = e.touches[0].clientY; currentY = 0;
        elEditorDrop.style.transition = 'none';
      }, { passive: true });

      handle.addEventListener('touchmove', e => {
        if (!dragging) return;
        const y = e.touches[0].clientY - startY;
        if (y < 0) return;
        currentY = y;
        elEditorDrop.style.transform = `translateY(${y}px)`;
        if (e.cancelable) e.preventDefault();
      }, { passive: false });

      handle.addEventListener('touchend', () => {
        if (!dragging) return;
        dragging = false;
        if (currentY > 80) {
          elEditorDrop.style.transition = 'transform 0.25s cubic-bezier(0.32,0.72,0,1)';
          elEditorDrop.style.transform  = 'translateY(120%)';
          setTimeout(() => { elEditorDrop.classList.remove('open'); elEditorDrop.style.transform = ''; elEditorDrop.style.transition = ''; }, 250);
        } else {
          elEditorDrop.style.transition = 'transform 0.2s cubic-bezier(0.32,0.72,0,1)';
          elEditorDrop.style.transform  = '';
          setTimeout(() => elEditorDrop.style.transition = '', 200);
        }
      }, { passive: true });
    })();

    // ── Инициализация ──
    renderCalendar();

    // Скролл к сегодня на мобайле
    (function() {
      if (window.innerWidth > 600) return;
      const dow     = now.getDay();
      const colIndex = (dow + 6) % 7;
      const wrap    = document.querySelector('.cal-scroll-wrap');
      if (wrap) wrap.scrollLeft = colIndex * (window.innerWidth / 2);
    })();

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(renderCalendar, 300);
    });

  </script>
</body>
</html>
